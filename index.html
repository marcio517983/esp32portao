<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.8);
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444; 
            --warning: #f59e0b;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            /* Fundo com gradiente para destacar as bordas */
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(30, 41, 59, 0.4) 0, transparent 50%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* CARD CENTRAL COM BORDA MUITO DEFINIDA */
        .status-card {
            background: var(--card);
            backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 40px;
            margin: 30px 0;
            /* Borda estilo "Glass" bem visível */
            border: 3px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #gateText { 
            font-size: 2.5rem; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: -1px;
        }
        
        /* BOTÃO COM BORDA DE ALTO CONTRASTE */
        .btn-action {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            /* Borda grossa e clara para destacar */
            border: 8px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(145deg, #3b82f6, #1e40af);
            color: white;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            transition: all 0.2s ease;
            /* Sombra interna para dar volume */
            box-shadow: inset 0 4px 10px rgba(255,255,255,0.2), 
                        0 10px 20px rgba(0,0,0,0.4);
            animation: glow-border 3s infinite;
        }

        /* Efeito de clique realístico */
        .btn-action:active {
            transform: scale(0.95);
            border-color: var(--accent);
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Animação que muda a cor da borda */
        @keyframes glow-border {
            0% { border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0px var(--accent); }
            50% { border-color: rgba(59, 130, 246, 0.8); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
            100% { border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 0 0px var(--accent); }
        }

        /* Status de Conexão */
        .conn-badge {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .dot {
            height: 10px; width: 10px; border-radius: 50%;
            margin-right: 8px; background: var(--danger);
        }
        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* Cores de Mensagem */
        .text-danger { color: #ff4d4d; text-shadow: 0 0 10px rgba(255, 77, 77, 0.3); }
        .text-success { color: #00ff88; }
        .text-warning { color: #ffcc00; }

        #alertBanner {
            background: var(--danger);
            color: white;
            padding: 10px;
            border-radius: 12px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="conn-badge">
        <div id="connDot" class="dot"></div>
        <span id="connLabel">OFFLINE</span>
    </div>

    <header>
        <h1 style="margin:0; font-size: 2.2rem; font-weight: 900;">CONTROWS</h1>
        <p style="margin:0; color: var(--accent); letter-spacing: 2px; font-size: 0.8rem; font-weight: bold;">BOX INVERTER</p>
    </header>

    <div class="status-card">
        <div id="gateText" style="color: #64748b;">AGUARDANDO</div>
        <div id="alertBanner">⚠️ PORTÃO ABERTO!</div>
    </div>

    <button class="btn-action" onclick="enviarComando()">ACIONAR</button>
</div>

<script>
    const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
        clientId: 'web_' + Math.random().toString(16).substr(2, 5),
        username: 'esp32', password: '517983lgA', clean: true
    };

    const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
    let client = mqtt.connect(broker, options);

    client.on('connect', () => {
        document.getElementById('connDot').classList.add('online');
        document.getElementById('connLabel').innerText = "CONECTADO";
        client.subscribe('esp32/esp32_01/sensores');
    });

    client.on('offline', () => {
        document.getElementById('connDot').classList.remove('online');
        document.getElementById('connLabel').innerText = "OFFLINE";
    });

    client.on('message', (topic, msg) => {
        try {
            const data = JSON.parse(msg.toString());
            const display = document.getElementById('gateText');
            const alert = document.getElementById('alertBanner');

            alert.style.display = "none";

            if (data.sensor2 === "ABERTO") {
                display.innerText = "ABERTO";
                display.className = "text-success";
            } 
            else if (data.sensor2 === "FECHADO") {
                display.innerText = "FECHADO";
                display.className = "text-danger"; // Vermelho
            } 
            else if (data.sensor2 === "ALERTA") {
                display.innerText = "ALERTA";
                display.className = "text-warning";
                alert.style.display = "block";
                audio.play().catch(() => {});
            }
            else if (data.sensor2 === "MOVIMENTO") {
                display.innerText = "EM CURSO";
                display.className = "";
            }
        } catch (e) { console.log("Erro no dado recebido"); }
    });

    function enviarComando() {
        client.publish('esp32/esp32_01/comando', 'PULSO');
    }
</script>
</body>
</html>
