<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controws - Box Inverter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #333; border-radius: 20px; padding: 25px; background: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-weight: bold; font-size: 22px; color: #00aaff; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* Estilos de Status */
        .status-box { padding: 20px; border-radius: 12px; margin-bottom: 35px; font-size: 20px; font-weight: bold; transition: all 0.4s ease; border: 2px solid; }
        
        .status-fechado { background-color: #440000; color: #ff4d4d; border-color: #880000; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }
        .status-aberto { background-color: #002244; color: #00aaff; border-color: #004488; }
        .status-movimento { background-color: #333333; color: #cccccc; border-color: #555555; }

        .btn-acionar { 
            width: 100%; height: 120px; border-radius: 60px; border: none;
            background: linear-gradient(145deg, #0088cc, #00aaff);
            color: white; font-size: 24px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 170, 255, 0.4);
            transition: transform 0.1s;
        }
        .btn-acionar:active { transform: scale(0.96); background: #0077b3; }
        
        .footer { margin-top: 30px; font-size: 11px; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">CONTROWS <span style="color: #fff;">SISTEMAS</span></div>
        
        <div id="statusDisplay" class="status-box status-movimento">
            CARREGANDO...
        </div>

        <button class="btn-acionar" onclick="enviarComando()">
            ACIONAR
        </button>

        <div class="footer">
            Sistema Box Inverter v1.0<br>
            Criptografia de Acesso Ativa
        </div>
    </div>

    <script>
        var gateway = `ws://${window.location.hostname}/ws`;
        var websocket;

        function initWebSocket() {
            websocket = new WebSocket(gateway);
            websocket.onmessage = function(event) {
                const estado = event.data;
                const el = document.getElementById('statusDisplay');
                
                if(estado === 'fechado') {
                    el.innerText = 'PORTÃO FECHADO';
                    el.className = 'status-box status-fechado';
                } else if(estado === 'aberto') {
                    el.innerText = 'PORTÃO ABERTO';
                    el.className = 'status-box status-aberto';
                } else if(estado === 'movimento') {
                    el.innerText = 'EM MOVIMENTO...';
                    el.className = 'status-box status-movimento';
                }
            };
            websocket.onclose = function() { setTimeout(initWebSocket, 2000); };
        }

        function enviarComando() {
            fetch('/comando').then(response => {
                if(!response.ok) alert('Erro ao comunicar com Box Inverter');
            });
        }

        window.onload = initWebSocket;
    </script>
</body>
</html>
