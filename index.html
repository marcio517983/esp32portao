<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - PREMIUM CONTROL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --green-neon: #00ff41;
            --red-neon: #ff003c;
            --blue-neon: #00d2ff;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 90%;
            max-width: 380px;
            text-align: center;
            padding: 20px 0;
        }

        .conn-status {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #444;
            font-weight: bold;
        }
        .conn-status.online { color: var(--blue-neon); text-shadow: 0 0 10px var(--blue-neon); }

        header h1 { 
            margin: 0; font-size: 2.5rem; font-weight: 900; 
            letter-spacing: -1px; font-style: italic;
        }

        .status-card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 20px;
            margin: 25px 0;
            border: 2px solid #222;
            transition: all 0.5s ease;
            position: relative;
        }

        /* Título do Status */
        .status-label {
            font-size: 0.8rem;
            color: var(--blue-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .card-aberto { border-color: var(--green-neon); box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        .card-fechado { border-color: var(--red-neon); box-shadow: 0 0 20px rgba(255, 0, 60, 0.2); }

        #gateText { font-size: 3rem; font-weight: 900; margin: 0; }

        .btn-main {
            width: 160px; height: 160px; border-radius: 40px;
            border: 2px solid var(--blue-neon); background: transparent;
            color: var(--blue-neon); font-size: 1.2rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
            box-shadow: inset 0 0 15px rgba(0, 210, 255, 0.1);
            margin-bottom: 20px;
        }
        .btn-main:active { transform: scale(0.9); background: var(--blue-neon); color: #000; }

        .secondary-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-sub {
            background: transparent; border: 1px solid #333; color: #888;
            padding: 12px; border-radius: 10px; font-size: 0.75rem;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-sub:hover { border-color: var(--blue-neon); color: var(--text); }
        .btn-sub:active { background: #222; }

        .txt-green { color: var(--green-neon); text-shadow: 0 0 15px var(--green-neon); }
        .txt-red { color: var(--red-neon); text-shadow: 0 0 15px var(--red-neon); }
        .txt-dim { color: #333; }

        #alertBanner {
            position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
            background: var(--red-neon); color: white; padding: 6px 20px;
            font-size: 0.8rem; font-weight: 900; border-radius: 5px;
            display: none; white-space: nowrap; box-shadow: 0 0 15px var(--red-neon);
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="connStatus" class="conn-status">SISTEMA OFFLINE</div>

    <header>
        <h1>CONTROWS</h1>
        <div style="font-size: 0.7rem; opacity: 0.4; letter-spacing: 4px;">BOX INVERTER PRO</div>
    </header>

    <!-- Card Principal Atualizado -->
    <div id="mainCard" class="status-card">
        <div class="status-label">PORTÃO DE VEÍCULOS</div>
        <div id="gateText" class="txt-dim">AGUARDANDO</div>
        <div id="alertBanner">PORTÃO ABERTO</div>
    </div>

    <button class="btn-main" onclick="sendCmd('PULSO')">ACIONAR<br>PORTÃO</button>
    
    <div class="secondary-controls">
        <button class="btn-sub" onclick="sendCmd('AUTO')">PEDESTRE</button>
        <button class="btn-sub" onclick="acessoAdmin()">CONFIGURAR</button>
    </div>
</div>

<script>
    const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
        clientId: 'CONTROWS_WEB_' + Math.random().toString(16).substr(2, 5),
        username: 'esp32', 
        password: '517983lgA', 
        clean: true
    };

    const ADMIN_PIN = "5179";
    const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
    let client = mqtt.connect(broker, options);

    client.on('connect', () => {
        const statusEl = document.getElementById('connStatus');
        statusEl.innerText = "• BOX INVERTER ONLINE •";
        statusEl.classList.add('online');
        client.subscribe('esp32/esp32_01/sensores');
    });

    client.on('offline', () => {
        const statusEl = document.getElementById('connStatus');
        statusEl.innerText = "SISTEMA OFFLINE";
        statusEl.classList.remove('online');
    });

    client.on('message', (topic, msg) => {
        try {
            const data = JSON.parse(msg.toString());
            const display = document.getElementById('gateText');
            const card = document.getElementById('mainCard');
            const alert = document.getElementById('alertBanner');

            alert.style.display = "none";
            card.className = "status-card"; 

            if (data.sensor2 === "ABERTO") {
                display.innerText = "ABERTO";
                display.className = "txt-green";
                card.classList.add('card-aberto');
            } 
            else if (data.sensor2 === "FECHADO") {
                display.innerText = "FECHADO";
                display.className = "txt-red";
                card.classList.add('card-fechado');
            } 
            else if (data.sensor2 === "ALERTA") {
                display.innerText = "ALERTA";
                display.className = "txt-red";
                card.classList.add('card-fechado');
                alert.style.display = "block";
                audio.play().catch(() => {});
            }
            else if (data.sensor2 === "MOVIMENTO") {
                display.innerText = "CURSO...";
                display.className = "";
            }
        } catch (e) {
            console.error("Erro no processamento:", e);
        }
    });

    function sendCmd(comando) {
        client.publish('esp32/esp32_01/comando', comando);
    }

    function acessoAdmin() {
        const pin = prompt("ACESSO RESTRITO: PIN ADMIN");
        if (pin === ADMIN_PIN) {
            sendCmd('CONFIG');
            alert("COMANDO CONFIG ENVIADO");
        } else if (pin !== null) {
            alert("PIN INCORRETO");
        }
    }
</script>
</body>
</html>
