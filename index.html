<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - SEGURANÇA TOTAL</title>
    
    <!-- Configurações para PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0097e6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #f5f6fa; 
            --card-bg: #ffffff; 
            --text-main: #1e2229; 
            --text-sub: #57606f; 
            --blue-neon: #0097e6; 
            --admin-gold: #d4af37; 
            --green-neon: #2ecc71;
            --red-neon: #e74c3c;
            --amber-neon: #e67e22;
            --phone-border: #2c3e50; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #e9ecef;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- MOLDURA DO CELULAR --- */
        .phone-frame {
            width: 380px;
            height: 820px;
            background: var(--bg);
            border: 14px solid var(--phone-border);
            border-radius: 60px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .phone-frame::before {
            content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 160px; height: 30px; background: var(--phone-border);
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 100;
        }

        @media (max-width: 500px) {
            .phone-frame { width: 100vw; height: 100vh; border: none; border-radius: 0; }
            .phone-frame::before { display: none; }
        }

        .app-content { flex: 1; padding: 50px 25px; display: flex; flex-direction: column; justify-content: center; }

        /* --- UI --- */
        #loginPage, #deviceAuthPage {
            background: var(--card-bg);
            border: 2px solid var(--blue-neon);
            padding: 40px 25px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        #deviceAuthPage { display: none; border-color: var(--amber-neon); }

        .logo-title { font-size: 1.8rem; font-weight: 900; letter-spacing: 5px; color: var(--blue-neon); font-style: italic; margin-bottom: 25px; }

        input {
            width: 100%; padding: 16px; margin: 10px 0;
            background: #f8f9fa; border: 2px solid #ced4da;
            color: var(--text-main); border-radius: 14px; box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: var(--blue-neon);
        }

        #controlPanel { display: none; width: 100%; }

        /* STATUS DA CONEXÃO */
        .conn-status {
            font-size: 0.65rem; text-align: center; margin-bottom: 15px;
            letter-spacing: 2px; color: #7f8c8d; font-weight: bold; text-transform: uppercase;
        }
        .online { color: var(--blue-neon) !important; text-shadow: 0 0 4px rgba(0, 168, 255, 0.2); }

        /* PADRÃO DE CARDS COM CONTORNOS BEM VISÍVEIS */
        .card {
            background: var(--card-bg);
            border: 2px solid #bdf0ff; 
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 12px rgba(0, 151, 230, 0.05);
        }

        .label { font-size: 0.65rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .val { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; color: var(--text-main); }

        /* DESTAQUE NO BOTÃO PRINCIPAL */
        .main-btn { 
            cursor: pointer; 
            padding: 35px 20px; 
            border: 3px solid var(--blue-neon) !important; 
            box-shadow: 0 6px 16px rgba(0, 151, 230, 0.15);
        }

        /* AREA EXCLUSIVA ADMIN */
        #adminContainer { display: none; margin-bottom: 12px; }
        .grid-admin { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .admin-card { border: 2px solid var(--admin-gold) !important; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.1); }
        .admin-card .val { color: var(--admin-gold); font-size: 0.9rem; }

        .clickable:active { transform: scale(0.96); background: #f1f2f6; }

        /* GRADE DE RODAPÉ COM CONTORNOS EM AZUL NEON REFORÇADOS */
        .grid-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sub-btn {
            cursor: pointer;
            border: 3px solid var(--blue-neon) !important; /* Borda grossa azul neon viva */
            box-shadow: 0 4px 12px rgba(0, 151, 230, 0.12);
        }
        
        /* BORDAS DINÂMICAS DE STATUS */
        .border-green { border: 3px solid var(--green-neon) !important; background: rgba(46, 204, 113, 0.03); box-shadow: 0 4px 12px rgba(46, 204, 113, 0.15); }
        .border-red { border: 3px solid var(--red-neon) !important; background: rgba(231, 76, 60, 0.03); box-shadow: 0 4px 12px rgba(231, 76, 60, 0.15); }
        
        @keyframes pulse-red-light {
            0% { box-shadow: 0 0 8px rgba(231, 76, 60, 0.2); border-color: rgba(231, 76, 60, 0.6); }
            50% { box-shadow: 0 0 20px rgba(231, 76, 60, 0.4); border-color: var(--red-neon); }
            100% { box-shadow: 0 0 8px rgba(231, 76, 60, 0.2); border-color: rgba(231, 76, 60, 0.6); }
        }
        .border-alert { animation: pulse-red-light 1.5s infinite; border: 3px solid var(--red-neon) !important; background: rgba(231, 76, 60, 0.06); }
        
        .text-green { color: var(--green-neon) !important; }
        .text-red { color: var(--red-neon) !important; }
        .text-amber { color: var(--amber-neon) !important; }

        .user-tag { font-size: 0.55rem; color: var(--text-sub); text-align: center; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
        .device-info { font-size: 0.6rem; color: var(--amber-neon); margin-top: 10px; word-break: break-all; font-weight: bold; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="app-content">
        
        <!-- TELA DE LOGIN -->
        <div id="loginPage">
            <div class="logo-title">CONTROWS</div>
            <input type="email" id="email" placeholder="E-mail de acesso">
            <input type="password" id="password" placeholder="Senha">
            <button style="width:100%; padding:18px; background:var(--blue-neon); border:none; border-radius:14px; color:#fff; font-weight:900; cursor:pointer; margin-top:10px; box-shadow: 0 4px 12px rgba(0, 151, 230, 0.3);" onclick="handleLogin()">ENTRAR</button>
        </div>

        <!-- TELA DE BLOQUEIO DE DISPOSITIVO NOVO -->
        <div id="deviceAuthPage">
            <div class="logo-title" style="color: var(--amber-neon);">BLOQUEIO</div>
            <p style="font-size: 0.8rem; color: var(--text-sub);">Este dispositivo não está autorizado para este usuário.</p>
            <div class="device-info" id="deviceIdDisplay">ID: ---</div>
            <input type="text" id="activationKey" placeholder="Chave de Ativação">
            <button style="width:100%; padding:18px; background:var(--amber-neon); border:none; border-radius:14px; font-weight:900; color:#fff; cursor:pointer; margin-top:10px; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3);" onclick="verifyDeviceKey()">AUTORIZAR APARELHO</button>
            <button style="width:100%; padding:12px; background:transparent; border:2px solid #ced4da; color:var(--text-sub); border-radius:14px; font-weight:bold; cursor:pointer; margin-top:10px;" onclick="logout()">VOLTAR</button>
        </div>

        <!-- PAINEL DE CONTROLE -->
        <div id="controlPanel">
            <div id="connStatus" class="conn-status">BOX INVERTER OFFLINE</div>

            <!-- CONTORNO DINÂMICO DO STATUS DO PORTÃO -->
            <div id="mainCard" class="card">
                <div class="label">Monitoramento de Status</div>
                <div id="gateText" class="val">---</div>
            </div>

            <!-- BOTÕES EXCLUSIVOS DO ADMIN -->
            <div id="adminContainer" class="grid-admin">
                <div class="card admin-card clickable" onclick="sendHardwareConfig()">
                    <div class="label">Portão</div>
                    <div class="val">AUTO CONFIG</div>
                </div>
                <div class="card admin-card clickable" onclick="generateDeviceToken()">
                    <div class="label">Token Celular</div>
                    <div class="val">GERAR CHAVE</div>
                </div>
            </div>

            <!-- CONTORNO DO BOTÃO ACIONAR -->
            <div class="card main-btn clickable" onclick="sendCmdWithLog('PULSO')">
                <div class="label">Portão Principal</div>
                <div class="val" style="color: var(--blue-neon)">ACIONAR</div>
            </div>

            <!-- BOTÕES DE RODAPÉ COM BORDAS REFORÇADAS -->
            <div class="grid-footer">
                <div class="card sub-btn clickable" onclick="sendCmdWithLog('AUTO')">
                    <div class="label">Acesso</div>
                    <div class="val" style="font-size:0.9rem; color: var(--blue-neon);">PEDESTRE</div>
                </div>
                <div class="card sub-btn clickable" onclick="logout()">
                    <div class="label">Sair</div>
                    <div class="val" style="font-size:0.9rem; color: #7f8c8d;">SESSÃO</div>
                </div>
            </div>
            <div id="userTag" class="user-tag"></div>
        </div>

    </div>
</div>

<script>
    const ADMIN_EMAIL = "controwssistemas@gmail.com"; 

    const firebaseConfig = {
        apiKey: "AIzaSyBu4LrzBcnxtdCuFI2LWMRYQstRttEE5xM",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:fb13b841b9fb06f326cb5c",
        measurementId: "G-H1GEH28EVB"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function getDeviceUUID() {
        let uuid = localStorage.getItem('controws_device_uuid');
        if (!uuid) {
            uuid = 'DEV-' + Math.random().toString(36).substring(2, 10).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('controws_device_uuid', uuid);
        }
        return uuid;
    }

    function handleLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert("Acesso Negado: " + err.message));
    }

    function checkDeviceAuthorization(user) {
        if (user.email === ADMIN_EMAIL) {
            showDashboard(user);
            return;
        }

        const deviceUUID = getDeviceUUID();
        
        db.collection("usuarios_dispositivos").doc(user.email).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                if (data.deviceUUID === deviceUUID) {
                    showDashboard(user);
                } else {
                    showDeviceAuthPage(user.email, deviceUUID);
                }
            } else {
                showDeviceAuthPage(user.email, deviceUUID);
            }
        }).catch(err => {
            alert("Erro na validação de hardware: " + err.message);
            logout();
        });
    }

    function showDeviceAuthPage(email, uuid) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'none';
        document.getElementById('deviceAuthPage').style.display = 'block';
        document.getElementById('deviceIdDisplay').innerText = "ID DISPOSITIVO: " + uuid;
    }

    function verifyDeviceKey() {
        const user = auth.currentUser;
        const keyInserted = document.getElementById('activationKey').value.trim();
        const deviceUUID = getDeviceUUID();

        if(!keyInserted) return alert("Insira a chave!");

        db.collection("chaves_ativacao").doc(user.email).get().then(doc => {
            if (doc.exists && doc.data().chave === keyInserted) {
                db.collection("usuarios_dispositivos").doc(user.email).set({
                    deviceUUID: deviceUUID,
                    autorizadoEm: firebase.firestore.FieldValue.serverTimestamp(),
                    modeloInfo: navigator.userAgent.substring(0, 50)
                }).then(() => {
                    alert("Aparelho autorizado com sucesso!");
                    db.collection("chaves_ativacao").doc(user.email).delete();
                    showDashboard(user);
                });
            } else {
                alert("Chave de ativação inválida ou expirada.");
            }
        });
    }

    function showDashboard(user) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('deviceAuthPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'block';
        document.getElementById('userTag').innerText = "Acesso: " + user.email;
        
        if (user.email === ADMIN_EMAIL) {
            document.getElementById('adminContainer').style.display = 'grid';
        }
        initMQTT();
    }

    function logout() { 
        auth.signOut().then(() => {
            location.reload();
        }); 
    }

    let mqttClient;
    function initMQTT() {
        if (mqttClient && mqttClient.connected) return;

        mqttClient = mqtt.connect('wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32', password: '517983lgA', clientId: 'CONTROWS_' + Math.random().toString(16).substr(2, 5)
        });

        mqttClient.on('connect', () => {
            const st = document.getElementById('connStatus');
            st.innerText = "BOX INVERTER SISTEMA ONLINE";
            st.classList.add('online');
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });

        mqttClient.on('message', (t, msg) => {
            try {
                const data = JSON.parse(msg.toString());
                const display = document.getElementById('gateText');
                const card = document.getElementById('mainCard');
                
                if (data.sensor2.includes("ALERTA")) {
                    display.innerText = "ALERTA PORTÃO ABERTO";
                    display.className = "val text-red"; 
                    card.className = "card border-alert";
                } else if (data.sensor2 === "ABERTO") {
                    display.innerText = "ABERTO";
                    display.className = "val text-green"; 
                    card.className = "card border-green";
                } else if (data.sensor2 === "FECHADO") {
                    display.innerText = "FECHADO";
                    display.className = "val text-red"; 
                    card.className = "card border-red";
                } else {
                    display.innerText = data.sensor2; 
                    display.className = "val text-amber"; 
                    card.className = "card";
                }
            } catch (e) { }
        });
    }

    function sendHardwareConfig() {
        if (auth.currentUser.email !== ADMIN_EMAIL) return;
        if (!mqttClient) return alert("Erro: MQTT desconectado.");
        
        if (confirm("Deseja enviar o comando AUTO CONFIG para a placa do Portão?")) {
            mqttClient.publish('esp32/esp32_01/comando', 'CONFIG');
            
            db.collection("logs").add({
                usuario: auth.currentUser.email,
                acao: "CONFIG_PORTAO_HARDWARE",
                device: getDeviceUUID(),
                data: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Comando CONFIG enviado com sucesso!");
        }
    }

    function generateDeviceToken() {
        if (auth.currentUser.email !== ADMIN_EMAIL) return;
        
        const emailAlvo = prompt("Digite o e-mail do usuário que receberá a permissão de novo celular:");
        if (emailAlvo) {
            const tokenAleatorio = Math.floor(100000 + Math.random() * 900000).toString();
            
            db.collection("chaves_ativacao").doc(emailAlvo).set({
                chave: tokenAleatorio,
                geradoEm: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert(`Chave gerada para [${emailAlvo}]: ${tokenAleatorio}\nForneça este código ao usuário.`);
            }).catch(err => {
                alert("Erro ao gerar token: " + err.message);
            });
        }
    }

    function sendCmdWithLog(comando) {
        if (!mqttClient) return;
        mqttClient.publish('esp32/esp32_01/comando', comando);
        db.collection("logs").add({
            usuario: auth.currentUser.email,
            acao: comando,
            device: getDeviceUUID(),
            data: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    auth.onAuthStateChanged(user => { 
        if (user) {
            checkDeviceAuthorization(user); 
        } 
    });

    // REGISTRO DO SERVICE WORKER (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker ativo para CONTROWS:', reg.scope))
                .catch(err => console.error('Falha ao registrar Service Worker:', err));
        });
    }
</script>
</body>
</html>
