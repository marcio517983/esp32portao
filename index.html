<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --success: #00ff00; /* Verde sólido vibrante */
            --danger: #ff0000;  /* Vermelho sólido vibrante */
            --warning: #ffcc00;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Arial Black', sans-serif; /* Fonte mais robusta */
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* CARD COM BORDAS SÓLIDAS E CORES FORTES */
        .status-card {
            background-color: var(--card);
            padding: 40px 20px;
            border-radius: 20px;
            margin: 20px 0;
            border: 4px solid #ffffff; /* Borda branca sólida */
            box-shadow: 0 10px 0px rgba(0,0,0,0.3);
        }

        #gateText { 
            font-size: 3rem; 
            font-weight: 900; 
            margin: 0;
            text-transform: uppercase;
        }
        
        /* BOTÃO COM BORDA SÓLIDA GROSSA */
        .btn-action {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid #ffffff; /* Borda branca sólida */
            background: #2563eb;
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 8px 0px #1e40af;
        }

        .btn-action:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #1e40af;
            background: #1d4ed8;
        }

        /* CORES SÓLIDAS PARA OS STATUS */
        .status-aberto { 
            color: var(--success) !important; 
            text-shadow: none; 
        }

        .status-fechado { 
            color: var(--danger) !important; 
            text-shadow: none; 
        }

        /* Status de Conexão */
        .conn-status {
            margin-bottom: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .dot {
            display: inline-block;
            height: 12px; width: 12px; border-radius: 50%;
            margin-right: 5px; background: var(--danger);
            border: 2px solid white;
        }
        .dot.online { background: var(--success); }

        #alertBanner {
            background: var(--danger);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
            border: 2px solid white;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="conn-status">
        <div id="connDot" class="dot"></div>
        <span id="connLabel">SISTEMA OFFLINE</span>
    </div>

    <header>
        <h1 style="margin:0; font-size: 2.5rem;">CONTROWS</h1>
        <p style="margin:0; color: var(--accent); font-weight: bold;">BOX INVERTER</p>
    </header>

    <div class="status-card">
        <div id="gateText" style="color: #64748b;">---</div>
        <div id="alertBanner">⚠️ PORTÃO ABERTO!</div>
    </div>

    <button class="btn-action" onclick="enviarComando()">ACIONAR</button>
</div>

<script>
    const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
        clientId: 'web_' + Math.random().toString(16).substr(2, 5),
        username: 'esp32', password: '517983lgA', clean: true
    };

    const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
    let client = mqtt.connect(broker, options);

    client.on('connect', () => {
        document.getElementById('connDot').classList.add('online');
        document.getElementById('connLabel').innerText = "SISTEMA ONLINE";
        client.subscribe('esp32/esp32_01/sensores');
    });

    client.on('offline', () => {
        document.getElementById('connDot').classList.remove('online');
        document.getElementById('connLabel').innerText = "SISTEMA OFFLINE";
    });

    client.on('message', (topic, msg) => {
        try {
            const data = JSON.parse(msg.toString());
            const display = document.getElementById('gateText');
            const alert = document.getElementById('alertBanner');

            alert.style.display = "none";

            if (data.sensor2 === "ABERTO") {
                display.innerText = "ABERTO";
                display.className = "status-aberto";
            } 
            else if (data.sensor2 === "FECHADO") {
                display.innerText = "FECHADO";
                display.className = "status-fechado";
            } 
            else if (data.sensor2 === "ALERTA") {
                display.innerText = "ALERTA";
                display.className = "status-aberto";
                alert.style.display = "block";
                audio.play().catch(() => {});
            }
            else if (data.sensor2 === "MOVIMENTO") {
                display.innerText = "EM CURSO";
                display.className = "";
                display.style.color = "#ffffff";
            }
        } catch (e) { console.log("Erro no processamento"); }
    });

    function enviarComando() {
        client.publish('esp32/esp32_01/comando', 'PULSO');
    }
</script>
</body>
</html>
