<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - SECURE CLOUD</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --blue-neon: #00d2ff;
            --green-neon: #00ff41;
            --red-neon: #ff003c;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- TELA DE LOGIN --- */
        #loginPage {
            width: 90%;
            max-width: 350px;
            text-align: center;
            background: var(--card);
            padding: 40px 20px;
            border-radius: 20px;
            border: 2px solid var(--blue-neon);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--blue-neon);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- PAINEL DE CONTROLE (Escondido) --- */
        #controlPanel {
            display: none;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .conn-status { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 20px; color: #444; font-weight: bold; }
        .conn-status.online { color: var(--blue-neon); text-shadow: 0 0 10px var(--blue-neon); }
        
        .status-card { background: var(--card); padding: 30px; border-radius: 20px; margin: 20px 0; border: 2px solid #222; position: relative; }
        .status-label { font-size: 0.8rem; color: var(--blue-neon); text-transform: uppercase; margin-bottom: 10px; }
        #gateText { font-size: 2.5rem; font-weight: 900; }
        
        .card-aberto { border-color: var(--green-neon); box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); }
        .card-fechado { border-color: var(--red-neon); box-shadow: 0 0 20px rgba(255, 0, 60, 0.1); }
        .txt-green { color: var(--green-neon); }
        .txt-red { color: var(--red-neon); }

        .btn-main { width: 160px; height: 160px; border-radius: 40px; border: 2px solid var(--blue-neon); background: transparent; color: var(--blue-neon); font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 20px; }
        .secondary-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-sub { background: transparent; border: 1px solid #333; color: #888; padding: 12px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .user-info { font-size: 0.6rem; color: #555; margin-top: 30px; }
    </style>
</head>
<body>

<div id="loginPage">
    <h2 style="margin-top:0; letter-spacing: 2px;">CONTROWS</h2>
    <p style="font-size: 0.7rem; color: #666;">AUTENTICAÇÃO NECESSÁRIA</p>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button class="btn-login" onclick="handleLogin()">Entrar no Sistema</button>
</div>

<div id="controlPanel">
    <div id="connStatus" class="conn-status">CONECTANDO AO CLOUD...</div>
    
    <div id="mainCard" class="status-card">
        <div class="status-label">PORTÃO PRINCIPAL</div>
        <div id="gateText">---</div>
    </div>

    <button class="btn-main" onclick="sendCmdWithLog('PULSO')">ACIONAR<br>PORTÃO</button>
    
    <div class="secondary-controls">
        <button class="btn-sub" onclick="sendCmdWithLog('AUTO')">PORTÃO PEDESTRE</button>
        <button class="btn-sub" onclick="logout()">Sair</button>
    </div>

    <div id="userTag" class="user-info"></div>
</div>

<script>
    // --- SUA CONFIGURAÇÃO DO FIREBASE (DA IMAGEM) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAr9CL2mxHGwGW0qya1xYKb8iaMFh_wRRE",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:8cad81e0713b7b7626cb5c",
        measurementId: "G-LYHQ92L334"
    };

    // Inicializa Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- LÓGICA DE LOGIN ---
    function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                showDashboard(userCredential.user.email);
            })
            .catch((error) => {
                alert("Erro: " + error.message);
            });
    }

    function showDashboard(email) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'block';
        document.getElementById('userTag').innerText = "LOGADO COMO: " + email;
        initMQTT();
    }

    function logout() {
        auth.signOut().then(() => { location.reload(); });
    }

    // --- LÓGICA MQTT & LOGS ---
    let mqttClient;

    function initMQTT() {
        const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
        const options = {
            clientId: 'WEB_' + Math.random().toString(16).substr(2, 5),
            username: 'esp32', password: '517983lgA', clean: true
        };

        mqttClient = mqtt.connect(broker, options);

        mqttClient.on('connect', () => {
            document.getElementById('connStatus').innerText = "• BOX INVERTER ONLINE •";
            document.getElementById('connStatus').classList.add('online');
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });

        mqttClient.on('message', (topic, msg) => {
            const data = JSON.parse(msg.toString());
            const display = document.getElementById('gateText');
            const card = document.getElementById('mainCard');

            if (data.sensor2 === "ABERTO") {
                display.innerText = "ABERTO";
                display.className = "txt-green";
                card.className = "status-card card-aberto";
            } else if (data.sensor2 === "FECHADO") {
                display.innerText = "FECHADO";
                display.className = "txt-red";
                card.className = "status-card card-fechado";
            }
        });
    }

    function sendCmdWithLog(comando) {
        const user = auth.currentUser;
        if (!user) return;

        // 1. Envia MQTT
        mqttClient.publish('esp32/esp32_01/comando', comando);

        // 2. Grava no Banco de Dados (Firestore)
        const acaoNome = (comando === 'PULSO') ? "Acionou Portão Principal" : "Acionou Pedestre";
        
        db.collection("logs").add({
            usuario: user.email,
            acao: acaoNome,
            data: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            console.log("Ação monitorada e salva no banco!");
        });
    }

    // Mantém logado se atualizar a página
    auth.onAuthStateChanged((user) => {
        if (user) showDashboard(user.email);
    });
</script>
</body>
</html>
