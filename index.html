<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.8);
            --blue-neon: #00d2ff;
            --green-neon: #00ff41;
            --red-neon: #ff003c;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.05), transparent);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- CONTAINER GERAL --- */
        .container {
            width: 90%;
            max-width: 400px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- LOGIN --- */
        #loginPage {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--blue-neon);
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: 5px; color: var(--blue-neon); margin-bottom: 30px; }

        input {
            width: 100%; padding: 16px; margin: 10px 0;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 12px; box-sizing: border-box; font-size: 1rem;
        }

        .btn-action {
            width: 100%; padding: 18px; background: var(--blue-neon);
            color: #000; border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer; text-transform: uppercase;
            margin-top: 10px; transition: 0.3s;
        }

        /* --- PAINEL --- */
        #controlPanel { display: none; }

        .header { text-align: center; margin-bottom: 25px; }
        .conn-tag { font-size: 0.65rem; letter-spacing: 2px; color: #555; font-weight: bold; }
        .online { color: var(--blue-neon) !important; text-shadow: 0 0 8px var(--blue-neon); }

        /* Estilo dos Cards Harmônicos */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .status-card { text-align: center; padding: 30px 20px; }
        .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .val { font-size: 2.2rem; font-weight: 800; color: #333; }

        /* Botão Principal */
        .main-btn {
            background: linear-gradient(145deg, rgba(0,210,255,0.1), rgba(0,210,255,0.02));
            border: 1px solid var(--blue-neon);
            text-align: center;
            cursor: pointer;
            padding: 40px 20px;
        }

        .main-btn:active { transform: scale(0.97); background: var(--blue-neon); }
        .main-btn:active .val, .main-btn:active .label { color: #000; }

        /* Grid Inferior */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sub-btn { padding: 20px; text-align: center; cursor: pointer; }
        .sub-btn .val { font-size: 1.1rem; color: #ffffff; }

        /* Cores de Status */
        .border-green { border-color: var(--green-neon) !important; box-shadow: 0 0 15px rgba(0,255,65,0.1); }
        .border-red { border-color: var(--red-neon) !important; box-shadow: 0 0 15px rgba(255,0,60,0.1); }
        .text-green { color: var(--green-neon) !important; text-shadow: 0 0 10px var(--green-neon); }
        .text-red { color: var(--red-neon) !important; text-shadow: 0 0 10px var(--red-neon); }

        .footer-info { font-size: 0.6rem; color: #444; text-align: center; margin-top: 30px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <div class="logo">CONTROWS</div>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="password" placeholder="Senha">
        <button class="btn-action" onclick="handleLogin()">Entrar</button>
    </div>

    <div id="controlPanel">
        <div class="header">
            <div id="connStatus" class="conn-tag">DISPOSITIVO OFFLINE</div>
        </div>

        <div id="mainCard" class="card status-card">
            <div class="label">Status Atual</div>
            <div id="gateText" class="val">---</div>
        </div>

        <div class="card main-btn" onclick="sendCmdWithLog('PULSO')">
            <div class="label">Comando Principal</div>
            <div class="val" style="color: var(--blue-neon)">ACIONAR</div>
        </div>

        <div class="grid">
            <div class="card sub-btn" onclick="sendCmdWithLog('AUTO')">
                <div class="label">Acesso</div>
                <div class="val">PEDESTRE</div>
            </div>
            <div class="card sub-btn" onclick="logout()" style="border-color: rgba(255,255,255,0.1)">
                <div class="label">Sessão</div>
                <div class="val" style="color: #666">SAIR</div>
            </div>
        </div>

        <div id="userTag" class="footer-info"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBu4LrzBcnxtdCuFI2LWMRYQstRttEE5xM",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:fb13b841b9fb06f326cb5c",
        measurementId: "G-H1GEH28EVB"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
    }

    function showDashboard(email) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'block';
        document.getElementById('userTag').innerText = "Autenticado: " + email;
        initMQTT();
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    let mqttClient;
    function initMQTT() {
        mqttClient = mqtt.connect('wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32', password: '517983lgA', clientId: 'CONTROWS_' + Math.random().toString(16).substr(2, 5)
        });

        mqttClient.on('connect', () => {
            const status = document.getElementById('connStatus');
            status.innerText = "BOX INVERTER ONLINE";
            status.classList.add('online');
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });

        mqttClient.on('message', (topic, msg) => {
            const data = JSON.parse(msg.toString());
            const display = document.getElementById('gateText');
            const card = document.getElementById('mainCard');

            if (data.sensor2 === "ABERTO") {
                display.innerText = "ABERTO";
                display.className = "val text-green";
                card.className = "card status-card border-green";
            } else if (data.sensor2 === "FECHADO") {
                display.innerText = "FECHADO";
                display.className = "val text-red";
                card.className = "card status-card border-red";
            } else {
                display.innerText = "EM CURSO";
                display.className = "val";
                card.className = "card status-card";
            }
        });
    }

    function sendCmdWithLog(comando) {
        if (!mqttClient) return;
        mqttClient.publish('esp32/esp32_01/comando', comando);
        db.collection("logs").add({
            usuario: auth.currentUser.email,
            acao: (comando === 'PULSO') ? "Total" : "Pedestre",
            data: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    auth.onAuthStateChanged(user => { if (user) showDashboard(user.email); });
</script>
</body>
</html>
