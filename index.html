<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS SISTEMAS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        header span {
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 30px;
            margin: 30px 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            min-height: 150px; /* Mantém a altura mesmo sem texto */
        }

        #gateText {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0;
            transition: 0.3s;
            height: 60px;
        }

        .btn-action {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
            margin: 20px auto;
            transition: transform 0.1s;
        }

        .btn-action:active {
            transform: scale(0.95);
        }

        #alertBanner {
            background: var(--danger);
            color: white;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            margin-top: 20px;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .on { color: var(--success); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>CONTROWS</h1>
        <span>SISTEMAS DE AUTOMAÇÃO</span>
    </header>

    <div class="status-card">
        <div style="font-size: 0.9rem; opacity: 0.6; margin-bottom: 10px;">SISTEMA</div>
        <div id="gateText">CONECTANDO...</div>
        <div id="alertBanner">⚠️ ATENÇÃO: PORTÃO ABERTO!</div>
    </div>

    <button class="btn-action" onclick="enviarComando()">ACIONAR</button>
</div>

<script>
    const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
        clientId: 'web_client_' + Math.random().toString(16).substr(2, 8),
        username: 'esp32',
        password: '517983lgA',
        clean: true
    };

    const TEMPO_LIMITE_ALERTA = 30000; // 30 segundos
    let timerPortaoAberto = null;
    const audioAlerta = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
    let mqttClient = mqtt.connect(broker, options);

    mqttClient.on('connect', () => {
        document.getElementById('gateText').innerText = "ONLINE";
        mqttClient.subscribe('esp32/esp32_01/sensores');
    });

    mqttClient.on('message', (topic, message) => {
        if (topic === 'esp32/esp32_01/sensores') {
            const data = JSON.parse(message.toString());
            const textEl = document.getElementById('gateText');
            const alertEl = document.getElementById('alertBanner');

            if (data.sensor2 === "ABERTO") {
                textEl.innerText = "ABERTO";
                textEl.className = "on";
                
                // Inicia o timer se ainda não houver um rodando
                if (!timerPortaoAberto) {
                    timerPortaoAberto = setTimeout(() => {
                        alertEl.style.display = "block";
                        playAlert();
                    }, TEMPO_LIMITE_ALERTA);
                }
            } else {
                // Se o status for FECHADO ou qualquer outro
                textEl.innerText = ""; // Remove o texto "FECHADO"
                alertEl.style.display = "none";
                
                // Cancela o timer e para o som
                clearTimeout(timerPortaoAberto);
                timerPortaoAberto = null;
                stopAlert();
            }
        }
    });

    function enviarComando() {
        // Desbloqueia o áudio no navegador
        audioAlerta.play().then(() => {
            audioAlerta.pause();
            audioAlerta.currentTime = 0;
        }).catch(e => console.log("Áudio aguardando interação"));
        
        mqttClient.publish('esp32/esp32_01/comando', 'PULSO');
    }

    function playAlert() {
        audioAlerta.loop = true;
        audioAlerta.play().catch(e => console.log("Aguardando interação para som"));
    }

    function stopAlert() {
        audioAlerta.loop = false;
        audioAlerta.pause();
        audioAlerta.currentTime = 0;
    }
</script>

</body>
</html>
