<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --blue-neon: #00d2ff;
            --green-neon: #00ff41;
            --red-neon: #ff003c;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- TELA DE LOGIN --- */
        #loginPage {
            width: 90%;
            max-width: 350px;
            text-align: center;
            background: var(--card);
            padding: 40px 20px;
            border-radius: 24px;
            border: 2px solid var(--blue-neon);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.15);
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--blue-neon);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        /* --- PAINEL PRINCIPAL (ESCONDIDO) --- */
        #controlPanel {
            display: none;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .conn-status { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 20px; color: #444; font-weight: bold; }
        .conn-status.online { color: var(--blue-neon); text-shadow: 0 0 10px var(--blue-neon); }
        
        .status-card { background: var(--card); padding: 35px; border-radius: 24px; margin: 25px 0; border: 2px solid #222; position: relative; transition: 0.5s; }
        .status-label { font-size: 0.8rem; color: var(--blue-neon); text-transform: uppercase; margin-bottom: 12px; font-weight: 800; letter-spacing: 2px; }
        #gateText { font-size: 2.8rem; font-weight: 900; }
        
        .card-aberto { border-color: var(--green-neon); box-shadow: 0 0 25px rgba(0, 255, 65, 0.15); }
        .card-fechado { border-color: var(--red-neon); box-shadow: 0 0 25px rgba(255, 0, 60, 0.15); }
        .txt-green { color: var(--green-neon); text-shadow: 0 0 15px var(--green-neon); }
        .txt-red { color: var(--red-neon); text-shadow: 0 0 15px var(--red-neon); }

        .btn-main { 
            width: 170px; height: 170px; border-radius: 50px; 
            border: 2px solid var(--blue-neon); background: transparent; 
            color: var(--blue-neon); font-size: 1.2rem; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-bottom: 25px; 
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.05);
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.92); background: var(--blue-neon); color: black; }

        .secondary-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-sub { 
            background: transparent; border: 1px solid #333; color: #777; 
            padding: 14px; border-radius: 12px; font-size: 0.75rem; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; 
        }
        .btn-sub:active { border-color: var(--text); color: white; }
        
        .user-info { font-size: 0.65rem; color: #444; margin-top: 40px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="loginPage">
    <h1 style="margin:0; letter-spacing: 5px; color: var(--blue-neon); font-style: italic;">CONTROWS</h1>
    <p style="font-size: 0.7rem; color: #555; margin-bottom: 25px; letter-spacing: 2px;">PREMIUM GATE CONTROL</p>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button class="btn-login" onclick="handleLogin()">Acessar Sistema</button>
</div>

<div id="controlPanel">
    <div id="connStatus" class="conn-status">CONECTANDO AO CLOUD...</div>
    
    <div id="mainCard" class="status-card">
        <div class="status-label">PORTÃO PRINCIPAL</div>
        <div id="gateText" style="color: #333;">---</div>
    </div>

    <button class="btn-main" onclick="sendCmdWithLog('PULSO')">ACIONAR<br>PORTÃO</button>
    
    <div class="secondary-controls">
        <button class="btn-sub" onclick="sendCmdWithLog('AUTO')">PORTÃO PEDESTRE</button>
        <button class="btn-sub" onclick="logout()">Sair</button>
    </div>

    <div id="userTag" class="user-info"></div>
</div>

<script>
    // --- CONFIGURAÇÃO FIREBASE CORRIGIDA ---
    const firebaseConfig = {
        apiKey: "AIzaSyAr9CL2mxHGwGW0qya1xYKb8iaMFh_wRRE", // Corrigido O para 0
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:8cad81e0713b7b7626cb5c",
        measurementId: "G-LYHQ92L334"
    };

    // Inicialização
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Login
    function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        if(!email || !pass) return alert("Preencha todos os campos");

        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                showDashboard(userCredential.user.email);
            })
            .catch((error) => {
                alert("Falha na Autenticação: " + error.message);
            });
    }

    function showDashboard(email) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'block';
        document.getElementById('userTag').innerText = "Acesso autorizado: " + email;
        initMQTT();
    }

    function logout() {
        auth.signOut().then(() => { location.reload(); });
    }

    // MQTT & Monitoramento
    let mqttClient;
    function initMQTT() {
        const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
        const options = {
            clientId: 'CONTROWS_WEB_' + Math.random().toString(16).substr(2, 5),
            username: 'esp32', password: '517983lgA', clean: true
        };

        mqttClient = mqtt.connect(broker, options);

        mqttClient.on('connect', () => {
            document.getElementById('connStatus').innerText = "• BOX INVERTER ONLINE •";
            document.getElementById('connStatus').classList.add('online');
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });

        mqttClient.on('message', (topic, msg) => {
            try {
                const data = JSON.parse(msg.toString());
                const display = document.getElementById('gateText');
                const card = document.getElementById('mainCard');

                if (data.sensor2 === "ABERTO") {
                    display.innerText = "ABERTO";
                    display.className = "txt-green";
                    card.className = "status-card card-aberto";
                } else if (data.sensor2 === "FECHADO") {
                    display.innerText = "FECHADO";
                    display.className = "txt-red";
                    card.className = "status-card card-fechado";
                } else {
                    display.innerText = "CURSO...";
                    display.className = "";
                    card.className = "status-card";
                }
            } catch (e) { console.log("Dados inválidos"); }
        });
    }

    function sendCmdWithLog(comando) {
        const user = auth.currentUser;
        if (!user || !mqttClient) return;

        // Envia Comando
        mqttClient.publish('esp32/esp32_01/comando', comando);

        // Registra no Banco de Dados
        const acaoTxt = (comando === 'PULSO') ? "Abertura Total" : "Abertura Parcial";
        db.collection("logs").add({
            usuario: user.email,
            acao: acaoTxt,
            data: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // Persistência da Sessão
    auth.onAuthStateChanged((user) => {
        if (user) showDashboard(user.email);
    });
</script>
</body>
</html>
