<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --blue-neon: #00d2ff;
            --green-neon: #00ff41;
            --red-neon: #ff003c;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- TELA DE LOGIN --- */
        #loginPage {
            width: 90%;
            max-width: 350px;
            text-align: center;
            background: var(--card);
            padding: 50px 25px;
            border-radius: 30px;
            border: 2px solid var(--blue-neon);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--blue-neon);
            margin-bottom: 5px;
            font-style: italic;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--blue-neon);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: var(--blue-neon);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        /* --- PAINEL DE CONTROLE --- */
        #controlPanel {
            display: none;
            width: 95%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .conn-status { 
            font-size: 0.7rem; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            color: #333; 
            font-weight: bold;
            text-transform: uppercase;
        }
        .conn-status.online { 
            color: var(--blue-neon); 
            text-shadow: 0 0 10px var(--blue-neon); 
        }
        
        .status-card { 
            background: var(--card); 
            padding: 40px 20px; 
            border-radius: 25px; 
            margin: 20px 0; 
            border: 2px solid #222; 
            position: relative;
            transition: 0.5s;
        }
        .status-label { 
            font-size: 0.8rem; 
            color: var(--blue-neon); 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            font-weight: 800;
            letter-spacing: 2px;
        }
        #gateText { font-size: 3rem; font-weight: 900; letter-spacing: -1px; }
        
        .card-aberto { border-color: var(--green-neon); box-shadow: 0 0 25px rgba(0, 255, 65, 0.15); }
        .card-fechado { border-color: var(--red-neon); box-shadow: 0 0 25px rgba(255, 0, 60, 0.15); }
        .txt-green { color: var(--green-neon); text-shadow: 0 0 15px var(--green-neon); }
        .txt-red { color: var(--red-neon); text-shadow: 0 0 15px var(--red-neon); }

        .btn-main { 
            width: 180px; 
            height: 180px; 
            border-radius: 60px; 
            border: 3px solid var(--blue-neon); 
            background: transparent; 
            color: var(--blue-neon); 
            font-size: 1.2rem; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin: 30px 0;
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.1);
            transition: 0.2s;
        }
        .btn-main:active { 
            transform: scale(0.92); 
            background: var(--blue-neon); 
            color: black;
            box-shadow: 0 0 30px var(--blue-neon);
        }

        .secondary-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-sub { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #666; 
            padding: 15px; 
            border-radius: 15px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-sub:active { border-color: white; color: white; }
        
        .user-info { font-size: 0.65rem; color: #444; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="logo-text">CONTROWS</div>
    <p style="font-size: 0.7rem; color: #555; margin-bottom: 30px; letter-spacing: 2px;">SISTEMA DE ACESSO SMART</p>
    
    <input type="email" id="email" placeholder="E-mail de acesso">
    <input type="password" id="password" placeholder="Senha">
    
    <button class="btn-login" onclick="handleLogin()">Entrar no Sistema</button>
</div>

<div id="controlPanel">
    <div id="connStatus" class="conn-status">CONECTANDO AO CLOUD...</div>
    
    <div id="mainCard" class="status-card">
        <div class="status-label">STATUS DO PORTÃO</div>
        <div id="gateText" style="color: #222;">---</div>
    </div>

    <button class="btn-main" onclick="sendCmdWithLog('PULSO')">ACIONAR<br>PORTÃO</button>
    
    <div class="secondary-controls">
        <button class="btn-sub" onclick="sendCmdWithLog('AUTO')">PEDESTRE</button>
        <button class="btn-sub" onclick="logout()">Sair</button>
    </div>

    <div id="userTag" class="user-info"></div>
</div>

<script>
    // --- SUA CONFIGURAÇÃO FIREBASE (A QUE FUNCIONOU) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBu4LrzBcnxtdCuFI2LWMRYQstRttEE5xM",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:fb13b841b9fb06f326cb5c",
        measurementId: "G-H1GEH28EVB"
    };

    // Inicialização
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Lógica de Login
    function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        auth.signInWithEmailAndPassword(email, pass)
            .then((userCredential) => {
                showDashboard(userCredential.user.email);
            })
            .catch((error) => {
                alert("Erro: " + error.message);
            });
    }

    function showDashboard(email) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'block';
        document.getElementById('userTag').innerText = "Acesso autorizado: " + email;
        initMQTT();
    }

    function logout() {
        auth.signOut().then(() => { location.reload(); });
    }

    // MQTT & Monitoramento
    let mqttClient;
    function initMQTT() {
        const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
        const options = {
            clientId: 'CONTROWS_WEB_' + Math.random().toString(16).substr(2, 5),
            username: 'esp32', password: '517983lgA', clean: true
        };

        mqttClient = mqtt.connect(broker, options);

        mqttClient.on('connect', () => {
            const status = document.getElementById('connStatus');
            status.innerText = "• BOX INVERTER ONLINE •";
            status.classList.add('online');
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });

        mqttClient.on('message', (topic, msg) => {
            try {
                const data = JSON.parse(msg.toString());
                const display = document.getElementById('gateText');
                const card = document.getElementById('mainCard');

                if (data.sensor2 === "ABERTO") {
                    display.innerText = "ABERTO";
                    display.className = "txt-green";
                    card.className = "status-card card-aberto";
                } else if (data.sensor2 === "FECHADO") {
                    display.innerText = "FECHADO";
                    display.className = "txt-red";
                    card.className = "status-card card-fechado";
                } else {
                    display.innerText = "EM CURSO";
                    display.className = "";
                    card.className = "status-card";
                }
            } catch (e) { console.log("Erro de dados"); }
        });
    }

    function sendCmdWithLog(comando) {
        const user = auth.currentUser;
        if (!user || !mqttClient) return;

        // 1. Envia MQTT
        mqttClient.publish('esp32/esp32_01/comando', comando);

        // 2. Registra Log no Firestore
        const acaoTxt = (comando === 'PULSO') ? "Abertura Total" : "Abertura Pedestre";
        db.collection("logs").add({
            usuario: user.email,
            acao: acaoTxt,
            data: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // Persistência
    auth.onAuthStateChanged((user) => {
        if (user) showDashboard(user.email);
    });
</script>
</body>
</html>
