<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - IoT Control Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Cores mantidas do seu app, com o Ciano da imagem */
            --bg-main: rgba(17, 24, 39, 0.9); /* Grafite escura com transparência */
            --card-bg: #111827; 
            --cyan-neon: #00f0ff; /* Ciano vivo do Box Inverter */
            --cyan-glow: rgba(0, 240, 255, 0.4);
            --text-main: #ffffff;
            --text-sub: #9ca3af;
            --green-neon: #00ff87;
            --red-neon: #ff3b30;
            --amber-neon: #ff9f0a;
            --admin-gold: #ffd700;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;

            /* --- NOVO FUNDO BASEADO NA IMAGEM --- */
            /* Substitua 'background.jpg' pelo nome do arquivo da imagem promocional */
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Camada escura para contraste */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Escurece o fundo em 50% */
            z-index: 1;
        }

        /* --- NOVO EMBLEMA FLUTUANTE (Em cima do app) --- */
        .controws-emblem {
            width: 100px; height: 100px;
            background-image: url('emblema.png'); /* Salve o emblema como 'emblema.png' */
            background-size: contain; background-repeat: no-repeat; background-position: center;
            position: absolute; top: -110px; left: 50%; transform: translateX(-50%);
            filter: drop-shadow(0 0 10px var(--cyan-glow));
        }

        /* --- CONTEÚDO DO APLICATIVO --- */
        .app-container {
            width: 360px; /* Largura "premium" mantida */
            background: var(--bg-main);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 2; /* Garante que fique acima do overlay do body */
            position: relative;
            /* Se quiser um efeito de vidro, use: backdrop-filter: blur(5px); */
        }

        /* Responsividade para celulares reais */
        @media (max-width: 500px) {
            body { align-items: flex-start; overflow-y: auto; }
            body::before { background-color: rgba(0, 0, 0, 0.7); } /* Escurece mais no mobile */
            .controws-emblem { width: 80px; height: 80px; top: -90px; }
            .app-container { width: 100vw; height: 100vh; border-radius: 0; border: none; box-shadow: none; }
        }

        /* --- O RESTO DO SEU CSS DO APP VAI AQUI (Mantenha inputs, cards, main-btn, adminContainer, etc.) --- */
        /* Certifique-se de remover a regra antiga .phone-frame e .phone-frame::before */
        
        .app-content { 
            padding: 40px 24px; 
            display: flex; flex-direction: column; justify-content: center;
            width: 100%; height: 100%;
        }

        /* Exemplo de integração do botão ciano neon */
        .btn-action {
            /* ... (Mantenha o estilo do seu botão, mas use o ciano vibrante) ... */
            background: linear-gradient(135deg, #00b4d8 0%, #00f0ff 100%);
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="controws-emblem"></div>

    <div class="app-content">
        <div id="loginPage" style="display: block;">
            <div class="brand-header">
                <div class="logo-title" style="background: linear-gradient(135deg, #fff 40%, var(--cyan-neon) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CONTROWS</div>
                <div class="logo-subtitle">IoT Control</div>
            </div>
            <input type="email" id="email" placeholder="E-mail de acesso">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn-action">ENTRAR</button>
        </div>
        
        </div>
</div>

</body>
</html>
