<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROWS - Box Inverter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #2d2d2d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; border-top: 4px solid #007bff; }
        h1 { color: #007bff; margin-bottom: 5px; font-size: 22px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 6px; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .control-btn { background: #28a745; margin-top: 20px; padding: 20px; font-size: 18px; }
        .footer { margin-top: 20px; font-size: 11px; color: #666; }
        .setup-msg { color: #ffc107; font-weight: bold; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>CONTROWS</h1>
    <p>Sistemas de Automação</p>

    <!-- TELA DE LOGIN -->
    <div id="loginSection">
        <input type="email" id="email" placeholder="E-mail do Cliente">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="authLogin()">ENTRAR</button>
    </div>

    <!-- TELA DE TROCA DE SENHA (PRIMEIRO ACESSO) -->
    <div id="updatePassSection" class="hidden">
        <span class="setup-msg">Primeiro Acesso: Altere sua senha</span>
        <input type="password" id="newPass" placeholder="Nova Senha (mín. 6 dígitos)">
        <input type="password" id="confirmPass" placeholder="Confirme a Nova Senha">
        <button style="background: #ffc107; color: #000;" onclick="atualizarSenha()">ATUALIZAR E ACESSAR</button>
    </div>

    <!-- TELA DE CONTROLE -->
    <div id="controlSection" class="hidden">
        <p style="color: #28a745;">Dispositivo Online</p>
        <button class="control-btn" onclick="comandoESP32('abrir')">ABRIR PORTÃO</button>
        <button style="background: #dc3545; margin-top: 40px;" onclick="location.reload()">SAIR</button>
    </div>

    <div class="footer">
        Box Inverter v1.1 | Suporte: (12) 98878-8485
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, updatePassword } from "https://www.gstatic.com/firebasejs/9.x/firebase-auth.js";

    // Configurações do seu Firebase
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "ID_MESSAGING",
        appId: "ID_APP"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const SUFIXO_OCULTO = "C@wS*";
    const SENHA_PADRAO_VISIVEL = "123456";

    // Lógica de Login com Verificação de Sufixo
    window.authLogin = function() {
        const email = document.getElementById('email').value;
        const senhaDigitada = document.getElementById('pass').value;
        
        // O sistema tenta o login sempre adicionando o sufixo invisível
        const senhaParaValidar = senhaDigitada + SUFIXO_OCULTO;

        signInWithEmailAndPassword(auth, email, senhaParaValidar)
            .then((userCredential) => {
                if (senhaDigitada === SENHA_PADRAO_VISIVEL) {
                    // Se usou a senha padrão, força a troca
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('updatePassSection').classList.remove('hidden');
                } else {
                    liberarControles();
                }
            })
            .catch((error) => {
                alert("E-mail ou Senha incorretos.");
            });
    };

    // Lógica para Gravar Nova Senha com Sufixo Oculto
    window.atualizarSenha = function() {
        const nova = document.getElementById('newPass').value;
        const confirma = document.getElementById('confirmPass').value;
        const user = auth.currentUser;

        if (nova === confirma && nova.length >= 6 && nova !== SENHA_PADRAO_VISIVEL) {
            // Injeta o sufixo ocultamente antes de gravar no Firebase
            const senhaFinalFirebase = nova + SUFIXO_OCULTO;

            updatePassword(user, senhaFinalFirebase).then(() => {
                alert("Senha atualizada com sucesso!");
                liberarControles();
            }).catch((error) => {
                alert("Erro ao atualizar. Tente fazer login novamente.");
                location.reload();
            });
        } else {
            alert("Verifique se as senhas coincidem e possuem 6+ dígitos.");
        }
    };

    function liberarControles() {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('updatePassSection').classList.add('hidden');
        document.getElementById('controlSection').classList.remove('hidden');
    }

    window.comandoESP32 = function(acao) {
        const esp_ip = "http://192.168.1.50"; // IP local do seu ESP32
        fetch(`${esp_ip}/${acao}`, { mode: 'no-cors' })
            .then(() => alert("Portão acionado!"))
            .catch(() => alert("Erro: Conecte-se ao Wi-Fi do local."));
    };
</script>

</body>
</html>
