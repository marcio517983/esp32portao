<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - SEGURANÇA TOTAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg: #050507;
            --card-bg: rgba(25, 25, 30, 0.7);
            --blue-neon: #00d2ff;
            --admin-gold: #ffcc00; 
            --green-neon: #00ff41;
            --red-neon: #ff003c;
            --amber-neon: #ffaa00;
            --phone-border: #1a1a1d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- MOLDURA DO CELULAR --- */
        .phone-frame {
            width: 380px;
            height: 820px;
            background: radial-gradient(circle at center, #101015 0%, #050507 100%);
            border: 14px solid var(--phone-border);
            border-radius: 60px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .phone-frame::before {
            content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 160px; height: 30px; background: var(--phone-border);
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 100;
        }

        @media (max-width: 500px) {
            .phone-frame { width: 100vw; height: 100vh; border: none; border-radius: 0; }
            .phone-frame::before { display: none; }
        }

        .app-content { flex: 1; padding: 50px 25px; display: flex; flex-direction: column; justify-content: center; }

        /* --- UI --- */
        #loginPage, #deviceAuthPage {
            background: var(--card-bg);
            border: 1px solid var(--blue-neon);
            padding: 40px 25px;
            border-radius: 28px;
            text-align: center;
        }

        #deviceAuthPage { display: none; border-color: var(--amber-neon); }

        .logo-title { font-size: 1.8rem; font-weight: 900; letter-spacing: 5px; color: var(--blue-neon); font-style: italic; margin-bottom: 25px; }

        input {
            width: 100%; padding: 16px; margin: 10px 0;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 14px; box-sizing: border-box;
        }

        #controlPanel { display: none; width: 100%; }

        /* STATUS DA CONEXÃO */
        .conn-status {
            font-size: 0.65rem; text-align: center; margin-bottom: 15px;
            letter-spacing: 2px; color: #444; font-weight: bold; text-transform: uppercase;
        }
        .online { color: var(--blue-neon) !important; text-shadow: 0 0 8px var(--blue-neon); }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 210, 255, 0.25);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .val { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; }

        .main-btn { cursor: pointer; padding: 35px 20px; }

        #adminBtn { display: none; border-color: var(--admin-gold); }
        #adminBtn .val { color: var(--admin-gold); font-size: 1.1rem; }

        .clickable:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }

        .grid-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* ANIMAÇÃO DE ALERTA */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 10px rgba(255, 0, 60, 0.2); border-color: rgba(255, 0, 60, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 60, 0.6); border-color: var(--red-neon); }
            100% { box-shadow: 0 0 10px rgba(255, 0, 60, 0.2); border-color: rgba(255, 0, 60, 0.5); }
        }

        .border-green { border-color: var(--green-neon) !important; box-shadow: 0 0 20px rgba(0,255,65,0.15) !important; }
        .border-red { border-color: var(--red-neon) !important; box-shadow: 0 0 20px rgba(255,0,60,0.15) !important; }
        .border-alert { animation: pulse-red 1.5s infinite; border-width: 2px !important; }
        
        .text-green { color: var(--green-neon) !important; }
        .text-red { color: var(--red-neon) !important; }
        .text-amber { color: var(--amber-neon) !important; }

        .user-tag { font-size: 0.55rem; color: #444; text-align: center; margin-top: 20px; text-transform: uppercase; }
        .device-info { font-size: 0.6rem; color: #ffaa00; margin-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="app-content">
        
        <!-- TELA DE LOGIN -->
        <div id="loginPage">
            <div class="logo-title">CONTROWS</div>
            <input type="email" id="email" placeholder="E-mail de acesso">
            <input type="password" id="password" placeholder="Senha">
            <button style="width:100%; padding:18px; background:var(--blue-neon); border:none; border-radius:14px; font-weight:900; cursor:pointer; margin-top:10px;" onclick="handleLogin()">ENTRAR</button>
        </div>

        <!-- TELA DE BLOQUEIO DE DISPOSITIVO NOVO -->
        <div id="deviceAuthPage">
            <div class="logo-title" style="color: var(--amber-neon);">BLOQUEIO</div>
            <p style="font-size: 0.8rem; color: #aaa;">Este dispositivo não está autorizado para este usuário.</p>
            <div class="device-info" id="deviceIdDisplay">ID: ---</div>
            <input type="text" id="activationKey" placeholder="Chave de Ativação">
            <button style="width:100%; padding:18px; background:var(--amber-neon); border:none; border-radius:14px; font-weight:900; color:#000; cursor:pointer; margin-top:10px;" onclick="verifyDeviceKey()">AUTORIZAR APARELHO</button>
            <button style="width:100%; padding:12px; background:transparent; border:1px solid #444; color:#aaa; border-radius:14px; font-weight:bold; cursor:pointer; margin-top:10px;" onclick="logout()">VOLTAR</button>
        </div>

        <!-- PAINEL DE CONTROLE -->
        <div id="controlPanel">
            <div id="connStatus" class="conn-status">BOX INVERTER OFFLINE</div>

            <div id="mainCard" class="card">
                <div class="label">Monitoramento de Status</div>
                <div id="gateText" class="val">---</div>
            </div>

            <div id="adminBtn" class="card clickable" onclick="sendCmdWithLog('CONFIG')">
                <div class="label">Ferramentas Admin</div>
                <div id="adminVal" class="val">AUTO CONFIG</div>
            </div>

            <div class="card main-btn clickable" onclick="sendCmdWithLog('PULSO')">
                <div class="label">Portão Principal</div>
                <div class="val" style="color: var(--blue-neon)">ACIONAR</div>
            </div>

            <div class="grid-footer">
                <div class="card sub-btn clickable" onclick="sendCmdWithLog('AUTO')">
                    <div class="label">Acesso</div>
                    <div class="val" style="font-size:0.9rem;">PEDESTRE</div>
                </div>
                <div class="card sub-btn clickable" onclick="logout()">
                    <div class="label">Sair</div>
                    <div class="val" style="font-size:0.9rem; color: #666">SESSÃO</div>
                </div>
            </div>
            <div id="userTag" class="user-tag"></div>
        </div>

    </div>
</div>

<script>
    const ADMIN_EMAIL = "controwssistemas@gmail.com"; 

    const firebaseConfig = {
        apiKey: "AIzaSyBu4LrzBcnxtdCuFI2LWMRYQstRttEE5xM",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:fb13b841b9fb06f326cb5c",
        measurementId: "G-H1GEH28EVB"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 1. GERA OU CAPTURA UMA IDENTIDADE EXCLUSIVA PARA ESTE NAVEGADOR/APARELHO
    function getDeviceUUID() {
        let uuid = localStorage.getItem('controws_device_uuid');
        if (!uuid) {
            uuid = 'DEV-' + Math.random().toString(36).substring(2, 10).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('controws_device_uuid', uuid);
        }
        return uuid;
    }

    function handleLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert("Acesso Negado: " + err.message));
    }

    // 2. VERIFICAÇÃO DE VÍNCULO NO FIRESTORE
    function checkDeviceAuthorization(user) {
        if (user.email === ADMIN_EMAIL) {
            // Admin ignora validação local ou valida a si mesmo
            showDashboard(user);
            return;
        }

        const deviceUUID = getDeviceUUID();
        
        // Busca na coleção 'usuarios_dispositivos' o documento correspondente ao e-mail logado
        db.collection("usuarios_dispositivos").doc(user.email).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                // Se o UUID armazenado no banco for igual ao deste celular, libera o acesso
                if (data.deviceUUID === deviceUUID) {
                    showDashboard(user);
                } else {
                    // Senha correta, mas o aparelho é diferente! Bloqueia.
                    showDeviceAuthPage(user.email, deviceUUID);
                }
            } else {
                // Primeiro acesso do usuário: O admin precisa criar o registro ou fornecer a chave inicial.
                showDeviceAuthPage(user.email, deviceUUID);
            }
        }).catch(err => {
            alert("Erro na validação de hardware: " + err.message);
            logout();
        });
    }

    function showDeviceAuthPage(email, uuid) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'none';
        document.getElementById('deviceAuthPage').style.display = 'block';
        document.getElementById('deviceIdDisplay').innerText = "ID DISPOSITIVO: " + uuid;
    }

    // 3. ATIVAÇÃO DE NOVOS APARELHOS
    function verifyDeviceKey() {
        const user = auth.currentUser;
        const keyInserted = document.getElementById('activationKey').value.trim();
        const deviceUUID = getDeviceUUID();

        if(!keyInserted) return alert("Insira a chave!");

        // Validação via Firestore buscando se a chave digitada bate com a gerada para o usuário
        db.collection("chaves_ativacao").doc(user.email).get().then(doc => {
            if (doc.exists && doc.data().chave === keyInserted) {
                // Chave válida! Registra este celular definitivamente para este usuário
                db.collection("usuarios_dispositivos").doc(user.email).set({
                    deviceUUID: deviceUUID,
                    autorizadoEm: firebase.firestore.FieldValue.serverTimestamp(),
                    modeloInfo: navigator.userAgent.substring(0, 50)
                }).then(() => {
                    alert("Aparelho autorizado com sucesso!");
                    // Apaga a chave usada para não reutilizarem
                    db.collection("chaves_ativacao").doc(user.email).delete();
                    showDashboard(user);
                });
            } else {
                alert("Chave de ativação inválida ou expirada.");
            }
        });
    }

    function showDashboard(user) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('deviceAuthPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'block';
        document.getElementById('userTag').innerText = "Acesso: " + user.email;
        if (user.email === ADMIN_EMAIL) {
            document.getElementById('adminBtn').style.display = 'block';
            document.getElementById('adminVal').innerText = "GERAR CHAVE";
        }
        initMQTT();
    }

    function logout() { 
        auth.signOut().then(() => {
            localStorage.removeItem('firebase:AuthEventPersistence'); // Força limpeza de cache se necessário
            location.reload();
        }); 
    }

    let mqttClient;
    function initMQTT() {
        // Evita conexões duplicadas se re-chamado
        if (mqttClient && mqttClient.connected) return;

        mqttClient = mqtt.connect('wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32', password: '517983lgA', clientId: 'CONTROWS_' + Math.random().toString(16).substr(2, 5)
        });

        mqttClient.on('connect', () => {
            const st = document.getElementById('connStatus');
            st.innerText = "BOX INVERTER SISTEMA ONLINE";
            st.classList.add('online');
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });

        mqttClient.on('message', (t, msg) => {
            try {
                const data = JSON.parse(msg.toString());
                const display = document.getElementById('gateText');
                const card = document.getElementById('mainCard');
                
                if (data.sensor2.includes("ALERTA")) {
                    display.innerText = "ALERTA PORTÃO ABERTO";
                    display.className = "val text-red"; 
                    card.className = "card border-alert";
                } else if (data.sensor2 === "ABERTO") {
                    display.innerText = "ABERTO";
                    display.className = "val text-green"; 
                    card.className = "card border-green";
                } else if (data.sensor2 === "FECHADO") {
                    display.innerText = "FECHADO";
                    display.className = "val text-red"; 
                    card.className = "card border-red";
                } else {
                    display.innerText = data.sensor2; 
                    display.className = "val text-amber"; 
                    card.className = "card";
                }
            } catch (e) { }
        });
    }

    function sendCmdWithLog(comando) {
        // Nova função interna para o Administrador gerar tokens de novos celulares
        if (comando === 'CONFIG' && auth.currentUser.email === ADMIN_EMAIL) {
            const emailAlvo = prompt("Digite o e-mail do usuário que quer autorizar novo celular:");
            if(emailAlvo) {
                const tokenAleatorio = Math.floor(100000 + Math.random() * 900000).toString(); // Gera 6 dígitos
                db.collection("chaves_ativacao").doc(emailAlvo).set({
                    chave: tokenAleatorio,
                    geradoEm: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    alert(`Chave para ${emailAlvo}: ${tokenAleatorio}\nEnvie este código ao usuário.`);
                });
            }
            return;
        }

        if (!mqttClient) return;
        mqttClient.publish('esp32/esp32_01/comando', comando);
        db.collection("logs").add({
            usuario: auth.currentUser.email,
            acao: comando,
            device: getDeviceUUID(),
            data: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // INTERCEPTOR PRINCIPAL DO FIREBASE
    auth.onAuthStateChanged(user => { 
        if (user) {
            // Altera o comportamento original: em vez de ir direto ao painel, valida o dispositivo físico primeiro
            checkDeviceAuthorization(user); 
        } 
    });
</script>
</body>
</html>
