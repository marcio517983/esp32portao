<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROWS - Box Inverter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #2d2d2d; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; border-top: 4px solid #007bff; }
        h1 { color: #007bff; margin: 0; font-size: 24px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 6px; background: #3d3d3d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .control-btn { background: #28a745; margin-top: 20px; padding: 20px; font-size: 18px; width: 100%; }
        .control-btn:hover { background: #218838; }
        .footer { margin-top: 20px; font-size: 11px; color: #666; }
        .alert { color: #ffc107; font-size: 13px; margin-bottom: 15px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>CONTROWS</h1>
    <p>Sistemas de Automação</p>

    <!-- TELA 1: LOGIN -->
    <div id="loginSection">
        <input type="email" id="email" placeholder="E-mail do Cliente">
        <input type="password" id="pass" placeholder="Senha">
        <button id="btnLogin">ENTRAR</button>
    </div>

    <!-- TELA 2: TROCA DE SENHA OBRIGATÓRIA -->
    <div id="updateSection" class="hidden">
        <span class="alert">PRIMEIRO ACESSO: Altere sua senha</span>
        <input type="password" id="newPass" placeholder="Nova Senha (mín. 6 dígitos)">
        <input type="password" id="confirmPass" placeholder="Confirme a Nova Senha">
        <button id="btnUpdate" style="background: #ffc107; color: #000;">SALVAR E ATIVAR</button>
    </div>

    <!-- TELA 3: CONTROLE DO PORTÃO -->
    <div id="controlSection" class="hidden">
        <p style="color: #28a745;">✔ Conectado ao Box Inverter</p>
        <button class="control-btn" onclick="comandoESP32('abrir')">ABRIR PORTÃO</button>
        <button style="background: #dc3545; margin-top: 35px;" onclick="location.reload()">SAIR</button>
    </div>

    <div class="footer">
        Box Inverter v1.2 | Suporte: (12) 98878-8485
    </div>
</div>

<script type="module">
    // Importação dos módulos do Firebase via CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, updatePassword } from "https://www.gstatic.com/firebasejs/9.x/firebase-auth.js";

    // Configuração fornecida para o projeto CONTROWS
    const firebaseConfig = {
        apiKey: "AIzaSyBu4LrzBcnxtdCuFI2LWMRYQstRttEE5xM",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:fb13b841b9fb06f326cb5c",
        measurementId: "G-H1GEH28EVB"
    };

    // Inicializa o Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Configurações de segurança da CONTROWS SISTEMAS
    const SUFIXO_OCULTO = "C@wS*";
    const SENHA_PADRAO_VISIVEL = "123456";

    // --- LÓGICA DE LOGIN ---
    document.getElementById('btnLogin').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const senhaDigitada = document.getElementById('pass').value;
        
        // Injeta o sufixo ocultamente antes de validar no Firebase
        const senhaParaFirebase = senhaDigitada + SUFIXO_OCULTO;

        try {
            await signInWithEmailAndPassword(auth, email, senhaParaFirebase);
            
            // Verifica se o usuário ainda está usando a senha padrão
            if (senhaDigitada === SENHA_PADRAO_VISIVEL) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('updateSection').classList.remove('hidden');
            } else {
                liberarControles();
            }
        } catch (error) {
            console.error("Erro de login:", error.code);
            alert("Acesso negado. Verifique o e-mail e a senha informados.");
        }
    });

    // --- LÓGICA DE ATUALIZAÇÃO DE SENHA ---
    document.getElementById('btnUpdate').addEventListener('click', async () => {
        const nova = document.getElementById('newPass').value;
        const confirma = document.getElementById('confirmPass').value;
        const user = auth.currentUser;

        if (nova === confirma && nova.length >= 6 && nova !== SENHA_PADRAO_VISIVEL) {
            // Injeta o sufixo na nova senha escolhida pelo cliente[cite: 2]
            const senhaFinalFirebase = nova + SUFIXO_OCULTO;

            try {
                await updatePassword(user, senhaFinalFirebase);
                alert("Senha personalizada com sucesso!");
                liberarControles();
            } catch (error) {
                alert("Erro ao atualizar senha. Por favor, saia e entre novamente.");
                location.reload();
            }
        } else {
            alert("As senhas não coincidem ou não atendem aos requisitos mínimos.");
        }
    });

    function liberarControles() {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('updateSection').classList.add('hidden');
        document.getElementById('controlSection').classList.remove('hidden');
    }

    // --- COMANDO PARA O HARDWARE ESP32 ---
    window.comandoESP32 = function(acao) {
        // Envio direto para o IP local do Box Inverter[cite: 2]
        // Certifique-se de que o IP do ESP32 seja este ou use o mDNS configurado
        fetch(`http://192.168.1.50/${acao}`, { mode: 'no-cors' })
            .then(() => {
                alert("Portão acionado com sucesso!");
            })
            .catch((err) => {
                alert("Erro: Verifique se você está conectado ao Wi-Fi do portão.");
            });
    };
</script>

</body>
</html>
