<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --pure-green: #00FF00; /* Verde Sólido */
            --pure-red: #FF0000;   /* Vermelho Sólido */
            --text-main: #ffffff;
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* Status de Conexão */
        .conn-status {
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .dot {
            height: 12px; width: 12px; border-radius: 50%;
            background: var(--pure-red);
            border: 2px solid white;
        }
        .dot.online { background: var(--pure-green); }

        /* Card com Bordas Brancas */
        .status-card {
            background-color: var(--card);
            padding: 45px 20px;
            border-radius: 25px;
            margin: 20px 0;
            border: 5px solid #ffffff; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #gateText { 
            font-size: 3.5rem; 
            font-weight: 900; 
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Classes de Cores Sólidas */
        .status-aberto { color: var(--pure-green) !important; }
        .status-fechado { color: var(--pure-red) !important; }

        /* Botão de Acionamento */
        .btn-action {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 8px solid #ffffff;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 0px #1e40af;
            transition: all 0.1s;
        }

        .btn-action:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0px #1e40af;
        }

        #alertBanner {
            background: var(--pure-red);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
            border: 2px solid white;
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="conn-status">
        <div id="connDot" class="dot"></div>
        <span id="connLabel">SISTEMA OFFLINE</span>
    </div>

    <header>
        <h1 style="margin:0; font-size: 2.8rem;">CONTROWS</h1>
        <div style="color: var(--accent); font-size: 0.9rem; font-weight: bold; letter-spacing: 3px;">BOX INVERTER</div>
    </header>

    <div class="status-card">
        <div id="gateText" style="color: #64748b;">AGUARDANDO</div>
        <div id="alertBanner">⚠️ ALERTA: PORTÃO ABERTO!</div>
    </div>

    <button class="btn-action" onclick="enviarComando()">ACIONAR</button>
</div>

<script>
    const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
        clientId: 'web_' + Math.random().toString(16).substr(2, 5),
        username: 'esp32', password: '517983lgA', clean: true
    };

    const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
    let client = mqtt.connect(broker, options);

    client.on('connect', () => {
        document.getElementById('connDot').classList.add('online');
        document.getElementById('connLabel').innerText = "SISTEMA ONLINE";
        client.subscribe('esp32/esp32_01/sensores');
    });

    client.on('offline', () => {
        document.getElementById('connDot').classList.remove('online');
        document.getElementById('connLabel').innerText = "SISTEMA OFFLINE";
    });

    client.on('message', (topic, msg) => {
        try {
            const data = JSON.parse(msg.toString());
            const display = document.getElementById('gateText');
            const alert = document.getElementById('alertBanner');

            alert.style.display = "none";

            if (data.sensor2 === "ABERTO") {
                display.innerText = "ABERTO";
                display.className = "status-aberto";
            } 
            else if (data.sensor2 === "FECHADO") {
                display.innerText = "FECHADO";
                display.className = "status-fechado";
            } 
            else if (data.sensor2 === "ALERTA") {
                display.innerText = "ABERTO";
                display.className = "status-aberto";
                alert.style.display = "block";
                audio.play().catch(() => {});
            }
            else if (data.sensor2 === "MOVIMENTO") {
                display.innerText = "EM CURSO";
                display.className = "";
                display.style.color = "#ffffff";
            }
        } catch (e) { console.log("Erro na leitura"); }
    });

    function enviarComando() {
        client.publish('esp32/esp32_01/comando', 'PULSO');
    }
</script>
</body>
</html>
