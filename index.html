<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - IoT CONTROL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg-main: #0b0f19; 
            --card-bg: #111827; 
            --cyan-neon: #00f0ff; 
            --cyan-glow: rgba(0, 240, 255, 0.4);
            --text-main: #ffffff;
            --text-sub: #9ca3af;
            --green-neon: #00ff87;
            --red-neon: #ff3b30;
            --amber-neon: #ff9f0a;
            --admin-gold: #ffd700;
            --phone-border: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #060911;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- MOLDURA DO CELULAR (Desktop) --- */
        .phone-frame {
            width: 380px;
            height: 820px;
            background: var(--bg-main);
            border: 12px solid var(--phone-border);
            border-radius: 54px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Detalhe da Câmera/Notch */
        .phone-frame::before {
            content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 150px; height: 28px; background: var(--phone-border);
            border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; z-index: 100;
        }

        /* --- RESPONSIVIDADE TOTAL PARA CELULARES REAIS --- */
        @media (max-width: 500px), (max-height: 850px) {
            body {
                align-items: flex-start;
                overflow-y: auto;
            }
            .phone-frame { 
                width: 100vw; 
                height: 100vh; 
                min-height: 100vh;
                border: none; 
                border-radius: 0; 
                box-shadow: none;
            }
            .phone-frame::before { display: none; }
            .app-content {
                padding: 30px 20px;
            }
        }

        /* Container Interno */
        .app-content { 
            flex: 1; 
            padding: 50px 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            background-image: radial-gradient(circle at 50% 10%, rgba(0, 240, 255, 0.08) 0%, transparent 70%);
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* --- ESTADOS DE EXIBIÇÃO SEGUROS (Evita mistura de telas) --- */
        #loginPage, #deviceAuthPage, #controlPanel {
            display: none; /* Controlado via JS de forma estrita */
            width: 100%;
        }

        /* --- DESIGN DOS INPUTS --- */
        input {
            width: 100%; padding: 16px; margin: 12px 0;
            background: #1f2937; border: 2px solid #374151;
            color: var(--text-main); border-radius: 16px;
            font-size: 1rem; font-weight: 600;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--cyan-neon);
            box-shadow: 0 0 10px var(--cyan-glow);
        }

        /* --- BOTÕES PADRÃO --- */
        .btn-action {
            width: 100%; padding: 18px; 
            background: linear-gradient(135deg, #00b4d8 0%, #00f0ff 100%);
            border: none; border-radius: 16px; 
            color: #0b0f19; font-weight: 900; font-size: 1rem; letter-spacing: 1px;
            cursor: pointer; margin-top: 10px; 
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.4);
            transition: all 0.2s;
        }
        .btn-action:active { transform: scale(0.98); }

        /* --- ESTRUTURAS DE PAGINAS FIXAS --- */
        #loginPage, #deviceAuthPage {
            background: var(--card-bg);
            border: 2px solid #1f2937;
            padding: 40px 24px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* --- DESIGN DOS CABEÇALHOS --- */
        .brand-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-title { 
            font-size: 2.1rem; font-weight: 900; letter-spacing: 3px; 
            background: linear-gradient(135deg, #fff 40%, var(--cyan-neon) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .logo-subtitle {
            font-size: 0.75rem; color: var(--cyan-neon); font-weight: 800;
            letter-spacing: 5px; text-transform: uppercase; margin-top: 4px;
        }

        /* PAINEL DE CONTROLE INTEGRADO */
        .panel-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            flex: 1;
        }

        /* STATUS DA CONEXÃO MQTT */
        .conn-status {
            font-size: 0.7rem; text-align: center; margin-bottom: 20px;
            letter-spacing: 2px; color: #4b5563; font-weight: 900; text-transform: uppercase;
        }
        .online { color: var(--cyan-neon) !important; text-shadow: 0 0 8px var(--cyan-glow); }

        /* CARDS DO SISTEMA */
        .card {
            background: var(--card-bg);
            border: 2px solid #1f2937; 
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
        }

        .label { font-size: 0.7rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        .val { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; color: var(--text-main); }

        /* BOTÃO CENTRAL DE ACIONAMENTO PRINCIPAL */
        .main-btn { 
            cursor: pointer; 
            padding: 35px 20px; 
            background: radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.15) 0%, transparent 75%), var(--card-bg);
            border: 2px solid var(--cyan-neon) !important; 
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.2), inset 0 0 15px rgba(0, 240, 255, 0.05);
            margin: 15px 0;
        }
        .main-btn .val { color: var(--cyan-neon); text-shadow: 0 0 10px var(--cyan-glow); font-size: 2rem; letter-spacing: 2px; }

        /* GRID ADMINISTRATIVO */
        #adminContainer { display: none; margin-bottom: 12px; }
        .grid-admin { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .admin-card { border: 2px solid rgba(255, 215, 0, 0.3) !important; background: rgba(255, 215, 0, 0.02); margin-bottom: 0; }
        .admin-card .val { color: var(--admin-gold); font-size: 0.85rem; letter-spacing: 0.5px; }
        .admin-card .label { color: rgba(255, 215, 0, 0.7); }

        .clickable:active { transform: scale(0.97); filter: brightness(1.2); }

        /* GRADE DE RODAPÉ */
        .grid-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sub-btn { cursor: pointer; border: 2px solid #374151 !important; margin-bottom: 0; }
        .sub-btn .val { font-size: 0.95rem; font-weight: 800; }
        
        /* BORDAS E ESTADOS DE ALERTA DINÂMICOS */
        .border-green { border: 2px solid var(--green-neon) !important; box-shadow: 0 0 15px rgba(0, 255, 135, 0.15); }
        .border-red { border: 2px solid var(--red-neon) !important; box-shadow: 0 0 15px rgba(255, 59, 48, 0.15); }
        
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); border-color: rgba(0, 240, 255, 0.4); }
            50% { box-shadow: 0 0 25px rgba(0, 240, 255, 0.5); border-color: var(--cyan-neon); }
            100% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); border-color: rgba(0, 240, 255, 0.4); }
        }
        .border-alert { animation: pulse-cyan 1.5s infinite; border: 2px solid var(--cyan-neon) !important; }
        
        .text-green { color: var(--green-neon) !important; text-shadow: 0 0 8px rgba(0, 255, 135, 0.3); }
        .text-red { color: var(--red-neon) !important; text-shadow: 0 0 8px rgba(255, 59, 48, 0.3); }
        .text-amber { color: var(--amber-neon) !important; text-shadow: 0 0 8px rgba(255, 159, 10, 0.3); }

        .user-tag { font-size: 0.6rem; color: #4b5563; text-align: center; margin-top: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .device-info { font-size: 0.65rem; color: var(--amber-neon); margin-top: 10px; word-break: break-all; font-weight: bold; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="app-content">
        
        <div id="loginPage" style="display: block;">
            <div class="brand-header">
                <div class="logo-title">CONTROWS</div>
                <div class="logo-subtitle">IoT Control</div>
            </div>
            <input type="email" id="email" placeholder="E-mail de acesso">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn-action" onclick="handleLogin()">ENTRAR</button>
        </div>

        <div id="deviceAuthPage">
            <div class="logo-title" style="background: var(--red-neon); -webkit-background-clip: text;">BLOQUEIO</div>
            <div class="logo-subtitle" style="color: var(--red-neon);">Segurança Ativa</div>
            <p style="font-size: 0.85rem; color: var(--text-sub); margin-top: 15px;">Este dispositivo não está autorizado para este usuário.</p>
            <div class="device-info" id="deviceIdDisplay">ID: ---</div>
            <input type="text" id="activationKey" placeholder="Chave de Ativação">
            <button class="btn-action" style="background: linear-gradient(135deg, #ff9f0a 0%, #ff5e00 100%); box-shadow: 0 4px 20px rgba(255, 159, 10, 0.3); color: #000;" onclick="verifyDeviceKey()">AUTORIZAR APARELHO</button>
            <button style="width:100%; padding:14px; background:transparent; border:2px solid #374151; color:var(--text-sub); border-radius:16px; font-weight:bold; cursor:pointer; margin-top:12px;" onclick="logout()">VOLTAR</button>
        </div>

        <div id="controlPanel">
            <div class="panel-wrapper">
                <div>
                    <div class="brand-header" style="margin-bottom: 10px;">
                        <div class="logo-title" style="font-size: 1.5rem; letter-spacing: 2px;">BOX INVERTER</div>
                        <div class="logo-subtitle" style="font-size: 0.55rem; letter-spacing: 4px;">Controws Sistemas</div>
                    </div>
                    
                    <div id="connStatus" class="conn-status">SISTEMA OFFLINE</div>

                    <div id="mainCard" class="card">
                        <div class="label">Monitoramento de Status</div>
                        <div id="gateText" class="val">---</div>
                    </div>

                    <div id="adminContainer" class="grid-admin">
                        <div class="card admin-card clickable" onclick="sendHardwareConfig()">
                            <div class="label">Portão</div>
                            <div class="val">AUTO CONFIG</div>
                        </div>
                        <div class="card admin-card clickable" onclick="generateDeviceToken()">
                            <div class="label">Token Celular</div>
                            <div class="val">GERAR CHAVE</div>
                        </div>
                    </div>
                </div>

                <div class="card main-btn clickable" onclick="sendCmdWithLog('PULSO')">
                    <div class="label" style="color: rgba(0, 240, 255, 0.6);">Portão Principal</div>
                    <div class="val">ACIONAR</div>
                </div>

                <div>
                    <div class="grid-footer">
                        <div class="card sub-btn clickable" style="border-color: var(--cyan-neon) !important; background: rgba(0, 240, 255, 0.02);" onclick="sendCmdWithLog('AUTO')">
                            <div class="label" style="color: var(--cyan-neon);">Acesso</div>
                            <div class="val" style="color: #fff;">PEDESTRE</div>
                        </div>
                        <div class="card sub-btn clickable" onclick="logout()">
                            <div class="label">Sair</div>
                            <div class="val" style="color: var(--text-sub);">SESSÃO</div>
                        </div>
                    </div>
                    <div id="userTag" class="user-tag"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const ADMIN_EMAIL = "controwssistemas@gmail.com"; 

    const firebaseConfig = {
        apiKey: "AIzaSyBu4LrzBcnxtdCuFI2LWMRYQstRttEE5xM",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:fb13b841b9fb06f326cb5c",
        measurementId: "G-H1GEH28EVB"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function getDeviceUUID() {
        let uuid = localStorage.getItem('controws_device_uuid');
        if (!uuid) {
            uuid = 'DEV-' + Math.random().toString(36).substring(2, 10).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('controws_device_uuid', uuid);
        }
        return uuid;
    }

    function handleLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert("Acesso Negado: " + err.message));
    }

    function checkDeviceAuthorization(user) {
        if (user.email === ADMIN_EMAIL) {
            showDashboard(user);
            return;
        }

        const deviceUUID = getDeviceUUID();
        
        db.collection("usuarios_dispositivos").doc(user.email).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                if (data.deviceUUID === deviceUUID) {
                    showDashboard(user);
                } else {
                    showDeviceAuthPage(user.email, deviceUUID);
                }
            } else {
                showDeviceAuthPage(user.email, deviceUUID);
            }
        }).catch(err => {
            alert("Erro na validação de hardware: " + err.message);
            logout();
        });
    }

    function showDeviceAuthPage(email, uuid) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'none';
        document.getElementById('deviceAuthPage').style.display = 'block';
        document.getElementById('deviceIdDisplay').innerText = "ID DISPOSITIVO: " + uuid;
    }

    function verifyDeviceKey() {
        const user = auth.currentUser;
        const keyInserted = document.getElementById('activationKey').value.trim();
        const deviceUUID = getDeviceUUID();

        if(!keyInserted) return alert("Insira a chave!");

        db.collection("chaves_ativacao").doc(user.email).get().then(doc => {
            if (doc.exists && doc.data().chave === keyInserted) {
                db.collection("usuarios_dispositivos").doc(user.email).set({
                    deviceUUID: deviceUUID,
                    autorizadoEm: firebase.firestore.FieldValue.serverTimestamp(),
                    modeloInfo: navigator.userAgent.substring(0, 50)
                }).then(() => {
                    alert("Aparelho autorizado com sucesso!");
                    db.collection("chaves_ativacao").doc(user.email).delete();
                    showDashboard(user);
                });
            } else {
                alert("Chave de ativação inválida ou expirada.");
            }
        });
    }

    function showDashboard(user) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('deviceAuthPage').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'block'; // Alterado para block estável
        document.getElementById('userTag').innerText = "Acesso: " + user.email;
        
        if (user.email === ADMIN_EMAIL) {
            document.getElementById('adminContainer').style.display = 'grid';
        }
        initMQTT();
    }

    function logout() { 
        auth.signOut().then(() => {
            location.reload();
        }); 
    }

    let mqttClient;
    function initMQTT() {
        if (mqttClient && mqttClient.connected) return;

        mqttClient = mqtt.connect('wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32', password: '517983lgA', clientId: 'CONTROWS_' + Math.random().toString(16).substr(2, 5)
        });

        mqttClient.on('connect', () => {
            const st = document.getElementById('connStatus');
            st.innerText = "SISTEMA ONLINE";
            st.classList.add('online');
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });

        mqttClient.on('message', (t, msg) => {
            try {
                const data = JSON.parse(msg.toString());
                const display = document.getElementById('gateText');
                const card = document.getElementById('mainCard');
                
                if (data.sensor2.includes("ALERTA")) {
                    display.innerText = "ALERTA PORTÃO ABERTO";
                    display.className = "val text-red"; 
                    card.className = "card border-alert";
                } else if (data.sensor2 === "ABERTO") {
                    display.innerText = "ABERTO";
                    display.className = "val text-green"; 
                    card.className = "card border-green";
                } else if (data.sensor2 === "FECHADO") {
                    display.innerText = "FECHADO";
                    display.className = "val text-red"; 
                    card.className = "card border-red";
                } else {
                    display.innerText = data.sensor2; 
                    display.className = "val text-amber"; 
                    card.className = "card";
                }
            } catch (e) { }
        });
    }

    function sendHardwareConfig() {
        if (auth.currentUser.email !== ADMIN_EMAIL) return;
        if (!mqttClient) return alert("Erro: MQTT desconectado.");
        
        if (confirm("Deseja enviar o comando AUTO CONFIG para a placa do Portão?")) {
            mqttClient.publish('esp32/esp32_01/comando', 'CONFIG');
            
            db.collection("logs").add({
                usuario: auth.currentUser.email,
                acao: "CONFIG_PORTAO_HARDWARE",
                device: getDeviceUUID(),
                data: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Comando CONFIG enviado com sucesso!");
        }
    }

    function generateDeviceToken() {
        if (auth.currentUser.email !== ADMIN_EMAIL) return;
        
        const emailAlvo = prompt("Digite o e-mail do usuário que receberá a permissão de novo celular:");
        if (emailAlvo) {
            const tokenAleatorio = Math.floor(100000 + Math.random() * 900000).toString();
            
            db.collection("chaves_ativacao").doc(emailAlvo).set({
                chave: tokenAleatorio,
                geradoEm: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert(`Chave gerada para [${emailAlvo}]: ${tokenAleatorio}\nForneça este código ao usuário.`);
            }).catch(err => {
                alert("Erro ao gerar token: " + err.message);
            });
        }
    }

    function sendCmdWithLog(comando) {
        if (!mqttClient) return;
        mqttClient.publish('esp32/esp32_01/comando', comando);
        db.collection("logs").add({
            usuario: auth.currentUser.email,
            acao: comando,
            device: getDeviceUUID(),
            data: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    auth.onAuthStateChanged(user => { 
        if (user) {
            checkDeviceAuthorization(user); 
        } 
    });
</script>
</body>
</html>
