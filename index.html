<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444; /* Cor para FECHADO e Alertas */
            --warning: #f59e0b;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #020617);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        /* Status de Conexão Superior */
        .conn-status {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--danger);
            transition: 0.3s;
        }
        .dot.online { background-color: var(--success); box-shadow: 0 0 10px var(--success); }

        header { margin-bottom: 30px; }
        header h1 { margin: 0; font-size: 2rem; letter-spacing: 2px; font-weight: 900; }
        .subtitle { color: var(--accent); font-size: 0.75rem; font-weight: 600; opacity: 0.8; }

        /* Card Central Moderno */
        .status-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            padding: 40px 20px;
            border-radius: 30px;
            margin: 25px 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }

        #gateText { 
            font-size: 2.2rem; 
            font-weight: 800; 
            margin: 0; 
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        
        /* Botão de Ação Estilizado */
        .btn-action {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
            transition: all 0.2s ease;
            position: relative;
            animation: breathe 3s infinite ease-in-out;
        }

        .btn-action:active { transform: scale(0.92); filter: brightness(1.2); }

        #alertBanner {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 12px;
            border-radius: 15px;
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: none;
            border: 1px solid var(--danger);
            animation: pulse 1.5s infinite;
        }

        /* Classes de Status */
        .text-success { color: var(--success); text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .text-danger { color: var(--danger); text-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .text-warning { color: var(--warning); }
        .text-muted { color: #64748b; }

        @keyframes breathe {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="conn-status">
        <span id="connDot" class="dot"></span>
        <span id="connLabel">OFFLINE</span>
    </div>

    <header>
        <h1>CONTROWS</h1>
        <div class="subtitle">BOX INVERTER PROJECT</div>
    </header>

    <div class="status-card">
        <div id="gateText" class="text-muted">---</div>
        <div id="alertBanner">⚠️ ALERTA: PORTÃO ABERTO!</div>
    </div>

    <button class="btn-action" onclick="enviarComando()">ACIONAR</button>
</div>

<script>
    const broker = 'wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt';
    const options = {
        clientId: 'web_' + Math.random().toString(16).substr(2, 5),
        username: 'esp32', password: '517983lgA', clean: true
    };

    const audio = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
    let client = mqtt.connect(broker, options);

    client.on('connect', () => {
        document.getElementById('connDot').classList.add('online');
        document.getElementById('connLabel').innerText = "SISTEMA ONLINE";
        client.subscribe('esp32/esp32_01/sensores');
    });

    client.on('offline', () => {
        document.getElementById('connDot').classList.remove('online');
        document.getElementById('connLabel').innerText = "SISTEMA OFFLINE";
    });

    client.on('message', (topic, msg) => {
        try {
            const data = JSON.parse(msg.toString());
            const display = document.getElementById('gateText');
            const alert = document.getElementById('alertBanner');

            // Reset geral
            alert.style.display = "none";
            audio.pause(); audio.currentTime = 0;

            if (data.sensor2 === "ABERTO") {
                display.innerText = "ABERTO";
                display.className = "text-success";
            } 
            else if (data.sensor2 === "FECHADO") {
                display.innerText = "FECHADO";
                display.className = "text-danger"; // Alterado para vermelho
            } 
            else if (data.sensor2 === "ALERTA") {
                display.innerText = "ABERTO";
                display.className = "text-warning";
                alert.style.display = "block";
                audio.loop = true; audio.play().catch(() => {});
            }
            else if (data.sensor2 === "MOVIMENTO") {
                display.innerText = "EM CURSO";
                display.className = "text-main";
            }
        } catch (e) {
            console.error("Erro no processamento da mensagem", e);
        }
    });

    function enviarComando() {
        // Feedback tátil visual e áudio
        audio.play().then(() => { audio.pause(); }).catch(() => {});
        client.publish('esp32/esp32_01/comando', 'PULSO');
    }
</script>
</body>
</html>
