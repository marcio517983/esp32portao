<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROWS - BOX INVERTER</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root { --bg: #050505; --card: #111111; --blue: #00d2ff; --green: #00ff41; --red: #ff003c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #loginPage, #controlPanel { width: 90%; max-width: 360px; background: var(--card); padding: 35px 20px; border-radius: 24px; border: 2px solid var(--blue); text-align: center; box-shadow: 0 0 20px rgba(0, 210, 255, 0.1); }
        #controlPanel { display: none; border-color: #222; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-login { background: var(--blue); color: #000; margin-top: 15px; }
        .btn-gate { width: 170px; height: 170px; border-radius: 50px; background: transparent; border: 2px solid var(--blue); color: var(--blue); font-size: 1.1rem; margin: 25px 0; font-weight: 900; }
        .btn-gate:active { background: var(--blue); color: #000; }
        .status-box { padding: 25px; border-radius: 20px; background: #0a0a0a; border: 1px solid #222; margin-bottom: 20px; }
        .grid-ctrl { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-sub { background: #1a1a1a; color: #666; border: 1px solid #333; font-size: 0.7rem; }
        .txt-green { color: var(--green); text-shadow: 0 0 10px var(--green); }
        .txt-red { color: var(--red); text-shadow: 0 0 10px var(--red); }
    </style>
</head>
<body>

<div id="loginPage">
    <h2 style="letter-spacing: 4px; color: var(--blue); margin: 0;">CONTROWS</h2>
    <p style="font-size: 0.7rem; color: #555; margin-bottom: 25px;">SISTEMA DE SEGURANÇA</p>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Senha">
    <button class="btn-login" onclick="entrar()">Acessar Painel</button>
</div>

<div id="controlPanel">
    <div id="mqttStat" style="font-size: 0.6rem; color: #444; margin-bottom: 10px;">A LIGAR AO CLOUD...</div>
    <div class="status-box">
        <div style="font-size: 0.7rem; color: var(--blue); margin-bottom: 8px; font-weight: bold; letter-spacing: 1px;">PORTÃO PRINCIPAL</div>
        <div id="gateText" style="font-size: 2.5rem; font-weight: 900;">---</div>
    </div>
    <button class="btn-gate" onclick="comando('PULSO')">ACIONAR<br>SISTEMA</button>
    <div class="grid-ctrl">
        <button class="btn-sub" onclick="comando('AUTO')">PEDESTRE</button>
        <button class="btn-sub" onclick="sair()">SAIR</button>
    </div>
    <div id="userTag" style="font-size: 0.6rem; color: #333; margin-top: 30px; text-transform: uppercase;"></div>
</div>

<script>
    // --- SUA CONFIGURAÇÃO ATUALIZADA ---
    const firebaseConfig = {
        apiKey: "AIzaSyBu4LrzBcnxtdCuFI2LWMRYQstRttEE5xM",
        authDomain: "controws.firebaseapp.com",
        projectId: "controws",
        storageBucket: "controws.firebasestorage.app",
        messagingSenderId: "554392538069",
        appId: "1:554392538069:web:fb13b841b9fb06f326cb5c",
        measurementId: "G-H1GEH28EVB"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let mqttClient;

    function entrar() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert("Acesso Negado: " + err.message));
    }

    function sair() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('controlPanel').style.display = 'block';
            document.getElementById('userTag').innerText = "Utilizador: " + user.email;
            conectar();
        }
    });

    function conectar() {
        mqttClient = mqtt.connect('wss://e6609cbe84ae4e2b8eda83c3164e7900.s1.eu.hivemq.cloud:8884/mqtt', {
            username: 'esp32', password: '517983lgA', clientId: 'WEB_' + Math.random().toString(16).substr(2, 5)
        });
        mqttClient.on('connect', () => {
            document.getElementById('mqttStat').innerText = "• BOX INVERTER ONLINE •";
            document.getElementById('mqttStat').style.color = "var(--blue)";
            mqttClient.subscribe('esp32/esp32_01/sensores');
        });
        mqttClient.on('message', (t, m) => {
            const d = JSON.parse(m.toString());
            const label = document.getElementById('gateText');
            label.innerText = d.sensor2;
            label.className = (d.sensor2 === "ABERTO") ? "txt-green" : (d.sensor2 === "FECHADO") ? "txt-red" : "";
        });
    }

    function comando(c) {
        if (!mqttClient) return;
        mqttClient.publish('esp32/esp32_01/comando', c);
        db.collection("logs").add({
            usuario: auth.currentUser.email,
            acao: (c === 'PULSO') ? "Abertura Total" : "Abertura Pedestre",
            data: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
</script>
</body>
</html>
